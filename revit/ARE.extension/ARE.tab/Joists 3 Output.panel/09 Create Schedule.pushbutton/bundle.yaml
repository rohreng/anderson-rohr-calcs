title: "09\nCreate Schedule"
tooltip: Builds two joist schedules - "ARE - Load Schedule" (SJI line loads, one row per load mark) and "ARE - Special Joist Loads" (only point-loaded joists, with the P1..Pn magnitude/distance columns). Clean SJI column headings set automatically. Run Assign Marks first; rebuild anytime, or re-run Assign Marks to refresh data live.
