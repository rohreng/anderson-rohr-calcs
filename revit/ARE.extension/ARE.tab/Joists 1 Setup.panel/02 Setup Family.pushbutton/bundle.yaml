title: "02\nSetup Family"
tooltip: One-click. Injects all ARE_J_* joist-load parameters + the ARE_J_ref_1ft helper + the line-load formulas into the K-series joist families already loaded in this project, then reloads them in place (existing joists keep geometry - no remodel). Shows a dry-run preview first. Idempotent - safe to re-run.
