title: "06
Point Loads"
tooltip: Select joist(s), then enter point loads as  kips@feet; kips@feet  (e.g. 1.5@6; 0.8@14.5). Writes P1-P5 magnitude/distance and a schedule callout (P1=1.5k @ 6'-0"; ...). Single joist pre-fills its current loads; multi-select applies the same set to all or clears. Blank = clear. Display-only (not added to the line load).
