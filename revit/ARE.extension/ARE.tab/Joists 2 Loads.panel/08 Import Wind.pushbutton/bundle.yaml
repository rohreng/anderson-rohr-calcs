title: "08\nImport Wind"
tooltip: Link the ARE web wind calculators to the joist schedule. Import a C&C export (Zone 1 interior -> ARE_G_Wind_psf, Zone 2 edge -> ARE_G_Wind2_psf, per-joist ARE_J_is_EdgeZone checkbox picks the zone) or an MWFRS export (envelope to both zones). Every joist's wind PLF and the load schedule update live. Can also open either calculator pre-filled with geometry read from this model.
