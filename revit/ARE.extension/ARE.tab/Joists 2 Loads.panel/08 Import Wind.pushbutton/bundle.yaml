title: "08\nImport Wind"
tooltip: Link the MWFRS web wind calc to the joist schedule. Import the calc's "Export for Revit" JSON (file or clipboard) to set the ARE_G_Wind_psf / ARE_G_WindDown_psf globals - every joist's wind PLF and the load schedule update live. Can also open the wind calculator pre-filled with geometry read from this model.
