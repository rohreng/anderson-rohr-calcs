title: "07
Assign Marks"
tooltip: Clusters joists by identical loading (type + DL + governing live + wind + uplift + point loads + axial) and writes a load mark (J1, J2.../G1...) to each, so the SJI Load Schedule shows one row per unique loading. Also writes governing axial + Wind/Seismic remark. "Preserve" keeps existing marks stable; "Renumber" re-derives clean. Re-run after changing loads.
