<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masonry ASD Design Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .input-group {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #3498db;
        }

        .input-group h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 600;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.95em;
        }

        input[type="number"], select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .grouting-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 10px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-group input[type="radio"] {
            margin: 0;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(149, 165, 166, 0.3);
        }

        .results-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            border-left: 5px solid #e74c3c;
        }

        .results-section h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.5em;
            text-align: center;
        }

        .result-group {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .result-group h4 {
            color: #e74c3c;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
        }

        .result-label {
            color: #555;
            font-weight: 500;
        }

        .result-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .pass {
            color: #27ae60;
        }

        .fail {
            color: #e74c3c;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pass {
            background: #d4edda;
            color: #155724;
        }

        .status-fail {
            background: #f8d7da;
            color: #721c24;
        }

        .save-load-section {
            grid-column: 1 / -1;
            background: #e8f5e8;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #27ae60;
            text-align: center;
        }

        .save-load-section h3 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .saved-designs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .saved-design {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #27ae60;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .saved-design:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(39, 174, 96, 0.2);
        }

        @media print {
            body { background: #fff; padding: 0; }
            .container { box-shadow: none; border-radius: 0; max-width: none; }
            .header { background: #fff; color: #1e3c72; padding: 10px 0; text-align: left; }
            .main-content { display: block; padding: 0; }
            .save-load-section { display: none !important; }
            .button-group { display: none !important; }
            .results-section, .result-group { box-shadow: none; }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .header h1 {
                font-size: 2em;
            }
        }
    </style>
  <link rel="stylesheet" href="./are-calc.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Masonry ASD Design Calculator</h1>
            <p>Allowable Stress Design for Masonry Structures</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <!-- Material Properties -->
                <div class="input-group blk">
                    <h3>Material Properties</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fm">Masonry Compressive Strength (f'm) [psi]</label>
                            <input type="number" id="fm" value="1500" step="50">
                        </div>
                        <div class="form-group">
                            <label for="fy">Steel Yield Strength (fy) [psi]</label>
                            <input type="number" id="fy" value="60000" step="1000">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="Es">Steel Modulus (Es) [psi]</label>
                            <input type="number" id="Es" value="29000000" step="1000000">
                        </div>
                        <div class="form-group">
                            <label for="Fs">Allowable Steel Stress (Fs) [psi]</label>
                            <input type="number" id="Fs" value="32000" step="1000">
                        </div>
                    </div>
                </div>

                <!-- Section Geometry -->
                <div class="input-group blk">
                    <h3>Section Geometry</h3>
                    <div style="text-align:center;margin:6px 0 12px">
                      <svg id="sectSvg" viewBox="0 0 320 190" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px"><!-- drawn live by areDrawSection() --></svg>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="b">Width (b) [in]</label>
                            <input type="number" id="b" value="12" step="0.5">
                        </div>
                        <div class="form-group">
                            <label for="l">Length/Thickness (l) [in]</label>
                            <input type="number" id="l" value="7.625" step="0.125">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="As">Steel Area (As) [in²]</label>
                            <input type="number" id="As" value="0.31" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="Av">Stirrup Area (Av) [in²]</label>
                            <input type="number" id="Av" value="0" step="0.01">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="s">Stirrup Spacing (s) [in]</label>
                            <input type="number" id="s" value="12" step="1">
                        </div>
                        <div class="form-group">
                            <label for="grouting">Grouting Type</label>
                            <select id="grouting">
                                <option value="0.75" selected>Partially Grouted (&gamma;g = 0.75)</option>
                                <option value="1.0">Fully Grouted (&gamma;g = 1.0)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Design Loads -->
                <div class="input-group blk">
                    <h3>Design Loads</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="M">Moment (M) [lb·in]</label>
                            <input type="number" id="M" value="18764" step="100">
                        </div>
                        <div class="form-group">
                            <label for="V">Shear (V) [lb]</label>
                            <input type="number" id="V" value="700" step="10">
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="calculate()">Calculate</button>
                    <button class="btn btn-secondary" onclick="clearInputs()">Clear</button>
                </div>
            </div>

            <div class="results-section summary">
                <h2>Design Results</h2>
                
                <div class="result-group">
                    <h4>Shear Stress Check</h4>
                    <div id="shearResults">
                        <p style="text-align: center; color: #666; font-style: italic;">Click "Calculate" to see results</p>
                    </div>
                </div>

                <div class="result-group">
                    <h4>Flexural Stress Check</h4>
                    <div id="flexuralResults">
                        <p style="text-align: center; color: #666; font-style: italic;">Click "Calculate" to see results</p>
                    </div>
                </div>
            </div>

            <div class="save-load-section">
                <h3>Save & Load Designs</h3>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="saveDesign()">Save Current Design</button>
                    <button class="btn btn-secondary" onclick="exportResults()">Export Results</button>
                </div>
                <div class="saved-designs" id="savedDesigns"></div>
            </div>
        </div>
    </div>

    <script>
        let savedDesigns = [];

        function getGroutingValue() {
            return parseFloat(document.getElementById('grouting').value);
        }

        function areDrawSection() {
            const svg = document.getElementById('sectSvg');
            if (!svg) return;
            const gv = (id, dflt) => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? dflt : v; };
            const b = Math.max(1, gv('b', 12)), l = Math.max(1, gv('l', 7.625));
            const As = gv('As', 0.31), V = gv('V', 0), M = gv('M', 0);
            const d = l / 2;

            // Section rectangle: clamp aspect so extreme b/l stay readable
            const ar = Math.min(3.5, Math.max(0.4, b / l));
            const maxW = 190, maxH = 120;
            let W, H;
            if (ar >= maxW / maxH) { W = maxW; H = W / ar; } else { H = maxH; W = H * ar; }
            W = Math.max(60, W); H = Math.max(34, H);
            const x0 = +(120 - W / 2).toFixed(1), x1 = +(120 + W / 2).toFixed(1);
            const y0 = +(80 - H / 2).toFixed(1), y1 = +(80 + H / 2).toFixed(1);
            const yd = +(parseFloat(y0) + H * (d / l)).toFixed(1);

            let s = '<defs>'
              + '<marker id="ms_dim" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto-start-reverse"><path d="M0,0 L7,3 L0,6z" fill="#1a7a4a"/></marker>'
              + '<marker id="ms_aR" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L0,7 L8,3.5z" fill="#c42b2b"/></marker>'
              + '</defs>';
            // Masonry section (designed element)
            s += '<rect x="' + x0 + '" y="' + y0 + '" width="' + W.toFixed(1) + '" height="' + H.toFixed(1) + '" fill="#fde68a" stroke="#1a2b5f" stroke-width="2"/>';
            // Section hatch
            for (let xh = parseFloat(x0) + 12; xh < parseFloat(x1); xh += 16) {
                s += '<line x1="' + xh.toFixed(1) + '" y1="' + y0 + '" x2="' + (xh - 8).toFixed(1) + '" y2="' + y1 + '" stroke="#d6a915" stroke-width="0.6" opacity="0.7"/>';
            }
            // Compression face marker (top)
            s += '<text x="120" y="' + (parseFloat(y0) - 5).toFixed(1) + '" font-size="9" fill="#1a2b5f" text-anchor="middle">compression face</text>';
            // Rebar at d = l/2
            s += '<circle cx="120" cy="' + yd + '" r="5" fill="#c42b2b" stroke="#7f1d1d" stroke-width="1.2"/>';
            s += '<text x="130" y="' + (parseFloat(yd) + 4).toFixed(1) + '" font-size="9" fill="#c42b2b" font-weight="600">As = ' + As.toFixed(2) + ' in&#178;</text>';
            // b dimension (bottom)
            s += '<line x1="' + x0 + '" y1="' + (parseFloat(y1) + 14).toFixed(1) + '" x2="' + x1 + '" y2="' + (parseFloat(y1) + 14).toFixed(1) + '" stroke="#1a7a4a" stroke-width="1" marker-start="url(#ms_dim)" marker-end="url(#ms_dim)"/>';
            s += '<text x="120" y="' + (parseFloat(y1) + 26).toFixed(1) + '" font-size="10" fill="#1a7a4a" font-weight="600" text-anchor="middle">b = ' + b + '&#8243;</text>';
            // l dimension (left) and d dimension (right)
            s += '<line x1="' + (parseFloat(x0) - 12).toFixed(1) + '" y1="' + y0 + '" x2="' + (parseFloat(x0) - 12).toFixed(1) + '" y2="' + y1 + '" stroke="#1a7a4a" stroke-width="1" marker-start="url(#ms_dim)" marker-end="url(#ms_dim)"/>';
            s += '<text x="' + (parseFloat(x0) - 18).toFixed(1) + '" y="83" font-size="10" fill="#1a7a4a" font-weight="600" text-anchor="middle" transform="rotate(-90,' + (parseFloat(x0) - 18).toFixed(1) + ',83)">l = ' + l + '&#8243;</text>';
            s += '<line x1="' + (parseFloat(x1) + 12).toFixed(1) + '" y1="' + y0 + '" x2="' + (parseFloat(x1) + 12).toFixed(1) + '" y2="' + yd + '" stroke="#c42b2b" stroke-width="1" marker-start="url(#ms_dim)" marker-end="url(#ms_dim)"/>';
            s += '<text x="' + (parseFloat(x1) + 22).toFixed(1) + '" y="' + ((parseFloat(y0) + parseFloat(yd)) / 2 + 3).toFixed(1) + '" font-size="9" fill="#c42b2b">d = ' + d.toFixed(2) + '&#8243;</text>';
            // Demand annotation
            s += '<text x="120" y="178" font-size="9" fill="#374151" text-anchor="middle">M = ' + Math.round(M).toLocaleString() + ' lb&#183;in &nbsp;|&nbsp; V = ' + Math.round(V).toLocaleString() + ' lb</text>';
            svg.innerHTML = s;
        }
        document.addEventListener('input', areDrawSection);
        document.addEventListener('change', areDrawSection);
        window.addEventListener('load', areDrawSection);

        function calculate() {
            // Get input values
            const fm = parseFloat(document.getElementById('fm').value);
            const fy = parseFloat(document.getElementById('fy').value);
            const Es = parseFloat(document.getElementById('Es').value);
            const Fs = parseFloat(document.getElementById('Fs').value);
            const b = parseFloat(document.getElementById('b').value);
            const l = parseFloat(document.getElementById('l').value);
            const As = parseFloat(document.getElementById('As').value);
            const Av = parseFloat(document.getElementById('Av').value);
            const s = parseFloat(document.getElementById('s').value);
            const M = parseFloat(document.getElementById('M').value);
            const V = parseFloat(document.getElementById('V').value);
            const yg = getGroutingValue();

            // Calculated properties
            const Em = 900 * fm;
            const d = l / 2;

            // Shear Stress Calculations
            const Anv = b * d;
            const fv = V / Anv;
            
            // M/Vd ratio (taken positive, need not exceed 1.0) — TMS 402-22 8.3.5.1.1
            const MVd_ratio = Math.min(Math.abs(M) / (V * d), 1.0);

            // Allowable masonry shear stress (TMS 402-22 Eq 8-24, P = 0 assumed)
            const Fvm = 0.5 * (4 - 1.75 * MVd_ratio) * Math.sqrt(fm);

            // Allowable steel shear stress (stirrups) — TMS 402-22 Eq 8-25
            const Fvs = 0.5 * (Av * Fs * d) / (Anv * s);

            // Maximum allowable shear stress — TMS 402-22 8.3.5.1.2
            // M/(Vd) <= 0.25: 3*sqrt(f'm)*yg ; M/(Vd) >= 1.0: 2*sqrt(f'm)*yg ; linear interpolation between
            let FvFactor;
            if (MVd_ratio <= 0.25) {
                FvFactor = 3.0;
            } else if (MVd_ratio >= 1.0) {
                FvFactor = 2.0;
            } else {
                FvFactor = 3.0 - (4.0 / 3.0) * (MVd_ratio - 0.25);
            }
            const Fvmmax = FvFactor * Math.sqrt(fm) * yg;

            // Total allowable shear stress
            const Fv = Math.min(Fvm + Fvs, Fvmmax);

            const shearPass = Fv >= fv;

            // Flexural Stress Calculations
            // Transformed-section stress calculations with given steel area
            const p = As / (b * d);
            const n = Es / Em;
            const k = Math.sqrt(Math.pow(n * p, 2) + 2 * n * p) - n * p;
            const j = 1 - k / 3;

            // Required steel area (using computed lever-arm factor j, not an assumed value)
            const AsREQ = M / (Fs * j * d);
            
            const fb = (2 * M) / (j * k * b * Math.pow(d, 2));
            const fs = M / (As * j * d);
            
            const fbmax = 0.45 * fm;
            
            const flexuralPass = fb <= fbmax && fs <= Fs;

            // Display results
            displayShearResults({
                Anv, fv, MVd_ratio, Fvm, Fvs, Fvmmax, Fv, shearPass
            });
            
            displayFlexuralResults({
                AsREQ, p: p * 1000, n, k, j, fb, fs, fbmax, flexuralPass, As, Fs
            });

            // Publish key results to ARE Results Hub
            if (typeof AREv2 !== 'undefined') {
                const maxDC = Math.max(Fv > 0 ? fv / Fv : 0, fbmax > 0 ? fb / fbmax : 0, Fs > 0 ? fs / Fs : 0);
                AREv2.publish([
                    {symbol:'M', label:'Design moment', value:+(M / 12000).toFixed(3), unit:'kip-ft', kind:'moment'},
                    {symbol:'V', label:'Design shear', value:+(V / 1000).toFixed(3), unit:'kips', kind:'shear'},
                    {symbol:'Fv', label:'Allowable shear stress', value:+Fv.toFixed(2), unit:'psi', kind:'capacity'},
                    {symbol:'AsREQ', label:'Required steel area', value:+AsREQ.toFixed(3), unit:'in^2', kind:'other'},
                    {symbol:'DC', label:'Max D/C ratio', value:+maxDC.toFixed(3), unit:'', kind:'other'}
                ]);
            }
            areDrawSection();
        }

        // Canonical check-row builder: rows=[{name,ref,demand,cap,dc,pass,det}]
        function buildChkTable(rows, startIdx) {
            let h = '<table class="chk-table"><thead><tr>'
                + '<th style="width:26%">Check</th><th>Reference</th><th>Demand</th><th>Capacity</th>'
                + '<th style="width:70px">D/C</th><th style="width:60px">Status</th><th style="width:70px">Detail</th>'
                + '</tr></thead><tbody>';
            rows.forEach(function(r, n) {
                const i = startIdx + n;
                const dc = (r.dc != null && isFinite(r.dc)) ? r.dc : null;
                const col = dc == null ? '#6b7a96' : (dc <= 0.8 ? '#1a7a4a' : dc <= 1.0 ? '#c47d0e' : '#c42b2b');
                const pct = dc == null ? 0 : Math.min(dc * 100, 150);
                const st = r.pass ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>';
                const dcCell = '<div class="dc-cell"><div class="dc-bar" style="width:60px"><div class="dc-fill" style="width:'
                    + pct + '%;background:' + col + '"></div></div><span>' + (dc == null ? '—' : dc.toFixed(2)) + '</span></div>';
                const detBtn = r.det ? '<button class="det-btn" id="dbtn_' + i + '" onclick="toggleDet(' + i + ')">\u25B8 Calc</button>' : '';
                h += '<tr class="chk-row"><td><strong>' + r.name + '</strong></td><td>' + (r.ref || '') + '</td><td>'
                    + (r.demand || '') + '</td><td>' + (r.cap || '') + '</td><td>' + dcCell + '</td><td>' + st + '</td><td>' + detBtn + '</td></tr>';
                if (r.det) h += '<tr class="det-row"><td colspan="7"><div class="calc-det" id="det_' + i + '"><div class="cbox mrow">' + r.det + '</div></div></td></tr>';
            });
            return h + '</tbody></table>';
        }

        function displayShearResults(results) {
            const dc = results.Fv > 0 ? results.fv / results.Fv : null;
            const det = 'A<sub>nv</sub> = ' + results.Anv.toFixed(2) + ' in&sup2; &nbsp;|&nbsp; f<sub>v</sub> = V/A<sub>nv</sub> = <span class="cval">' + results.fv.toFixed(3) + ' psi</span><br>'
                + 'M/(V&middot;d) = ' + results.MVd_ratio.toFixed(3) + ' &nbsp;|&nbsp; F<sub>vm</sub> = ' + results.Fvm.toFixed(3) + ' psi &nbsp;|&nbsp; F<sub>vs</sub> = ' + results.Fvs.toFixed(3) + ' psi<br>'
                + 'F<sub>vm,max</sub> = ' + results.Fvmmax.toFixed(3) + ' psi &nbsp;|&nbsp; F<sub>v</sub> = F<sub>vm</sub>+F<sub>vs</sub> &le; F<sub>vm,max</sub> = <span class="cval">' + results.Fv.toFixed(3) + ' psi</span>';
            const rows = [{
                name: 'Masonry Shear', ref: 'TMS 402 &sect;8.3',
                demand: 'f<sub>v</sub> = ' + results.fv.toFixed(2) + ' psi',
                cap: 'F<sub>v</sub> = ' + results.Fv.toFixed(2) + ' psi',
                dc: dc, pass: results.shearPass, det: det
            }];
            document.getElementById('shearResults').innerHTML = buildChkTable(rows, 0);
        }

        function displayFlexuralResults(results) {
            const dcB = results.fbmax > 0 ? results.fb / results.fbmax : null;
            const dcS = (typeof results.Fs !== 'undefined' && results.Fs > 0) ? results.fs / (results.Fs) : null;
            // governing flexural D/C across masonry & steel stress (math unchanged — pass flag from caller)
            const dcGov = Math.max(dcB || 0, dcS || 0);
            const det = '&rho; = ' + results.p.toFixed(3) + ' &times;10&#8315;&sup3; &nbsp;|&nbsp; n = ' + results.n.toFixed(1) + ' &nbsp;|&nbsp; k = ' + results.k.toFixed(3) + ' &nbsp;|&nbsp; j = ' + results.j.toFixed(3) + '<br>'
                + 'A<sub>s,req</sub> = M/(F<sub>s</sub>&middot;j&middot;d) = <span class="cval">' + results.AsREQ.toFixed(3) + ' in&sup2;</span> &nbsp;|&nbsp; A<sub>s,prov</sub> = ' + results.As.toFixed(3) + ' in&sup2;<br>'
                + 'Masonry: f<sub>b</sub> = ' + results.fb.toFixed(1) + ' psi &le; F<sub>b</sub> = 0.45f&#8242;<sub>m</sub> = ' + results.fbmax.toFixed(1) + ' psi (D/C = ' + (dcB!=null?dcB.toFixed(2):'—') + ')<br>'
                + 'Steel: f<sub>s</sub> = ' + results.fs.toFixed(0) + ' psi' + (dcS!=null ? ' &le; F<sub>s</sub> (D/C = ' + dcS.toFixed(2) + ')' : '');
            const rows = [{
                name: 'Flexural Stress', ref: 'TMS 402 &sect;8.2',
                demand: 'f<sub>b</sub> = ' + results.fb.toFixed(1) + ' psi',
                cap: 'F<sub>b</sub> = ' + results.fbmax.toFixed(1) + ' psi',
                dc: dcGov, pass: results.flexuralPass, det: det
            }];
            document.getElementById('flexuralResults').innerHTML = buildChkTable(rows, 1);
        }

        function clearInputs() {
            document.getElementById('fm').value = '1500';
            document.getElementById('fy').value = '60000';
            document.getElementById('Es').value = '29000000';
            document.getElementById('Fs').value = '32000';
            document.getElementById('b').value = '12';
            document.getElementById('l').value = '7.625';
            document.getElementById('As').value = '0.31';
            document.getElementById('Av').value = '0';
            document.getElementById('s').value = '12';
            document.getElementById('M').value = '18764';
            document.getElementById('V').value = '700';
            document.getElementById('grouting').value = '0.75';
            
            document.getElementById('shearResults').innerHTML = '<p style="text-align: center; color: #666; font-style: italic;">Click "Calculate" to see results</p>';
            document.getElementById('flexuralResults').innerHTML = '<p style="text-align: center; color: #666; font-style: italic;">Click "Calculate" to see results</p>';
        }

        function saveDesign() {
            const designName = prompt('Enter a name for this design:');
            if (!designName) return;
            
            const design = {
                name: designName,
                date: new Date().toLocaleDateString(),
                inputs: {
                    fm: document.getElementById('fm').value,
                    fy: document.getElementById('fy').value,
                    Es: document.getElementById('Es').value,
                    Fs: document.getElementById('Fs').value,
                    b: document.getElementById('b').value,
                    l: document.getElementById('l').value,
                    As: document.getElementById('As').value,
                    Av: document.getElementById('Av').value,
                    s: document.getElementById('s').value,
                    M: document.getElementById('M').value,
                    V: document.getElementById('V').value,
                    grouting: document.getElementById('grouting').value
                }
            };
            
            savedDesigns.push(design);
            updateSavedDesignsList();
        }

        function loadDesign(index) {
            const design = savedDesigns[index];
            const inputs = design.inputs;
            
            document.getElementById('fm').value = inputs.fm;
            document.getElementById('fy').value = inputs.fy;
            document.getElementById('Es').value = inputs.Es;
            document.getElementById('Fs').value = inputs.Fs;
            document.getElementById('b').value = inputs.b;
            document.getElementById('l').value = inputs.l;
            document.getElementById('As').value = inputs.As;
            document.getElementById('Av').value = inputs.Av;
            document.getElementById('s').value = inputs.s;
            document.getElementById('M').value = inputs.M;
            document.getElementById('V').value = inputs.V;
            document.getElementById('grouting').value = inputs.grouting || '0.75';
        }

        function deleteDesign(index) {
            if (confirm('Are you sure you want to delete this design?')) {
                savedDesigns.splice(index, 1);
                updateSavedDesignsList();
            }
        }

        function updateSavedDesignsList() {
            const container = document.getElementById('savedDesigns');
            if (savedDesigns.length === 0) {
                container.innerHTML = '<p style="color: #666; font-style: italic;">No saved designs</p>';
                return;
            }
            
            const html = savedDesigns.map((design, index) => `
                <div class="saved-design">
                    <h4>${design.name}</h4>
                    <p>Saved: ${design.date}</p>
                    <div style="margin-top: 10px;">
                        <button class="btn btn-primary" style="font-size: 12px; padding: 5px 10px;" onclick="loadDesign(${index})">Load</button>
                        <button class="btn btn-secondary" style="font-size: 12px; padding: 5px 10px; margin-left: 5px;" onclick="deleteDesign(${index})">Delete</button>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }

        function exportResults() {
            // Get current results from the display
            const shearResults = document.getElementById('shearResults').innerText;
            const flexuralResults = document.getElementById('flexuralResults').innerText;
            
            if (shearResults.includes('Click "Calculate"')) {
                alert('Please calculate results before exporting.');
                return;
            }
            
            const report = `
MASONRY ASD DESIGN CALCULATION REPORT
=====================================
Date: ${new Date().toLocaleDateString()}

MATERIAL PROPERTIES:
- Masonry Compressive Strength (f'm): ${document.getElementById('fm').value} psi
- Steel Yield Strength (fy): ${document.getElementById('fy').value} psi
- Steel Modulus (Es): ${document.getElementById('Es').value} psi
- Allowable Steel Stress (Fs): ${document.getElementById('Fs').value} psi

SECTION GEOMETRY:
- Width (b): ${document.getElementById('b').value} in
- Length/Thickness (l): ${document.getElementById('l').value} in
- Steel Area (As): ${document.getElementById('As').value} in²
- Stirrup Area (Av): ${document.getElementById('Av').value} in²
- Stirrup Spacing (s): ${document.getElementById('s').value} in
- Grouting: ${document.getElementById('grouting').value === '0.75' ? 'Partially Grouted' : 'Fully Grouted'}

DESIGN LOADS:
- Moment (M): ${document.getElementById('M').value} lb·in
- Shear (V): ${document.getElementById('V').value} lb

SHEAR STRESS CHECK:
${shearResults}

FLEXURAL STRESS CHECK:
${flexuralResults}
            `.trim();
            
            // Create downloadable file
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'masonry_design_report.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initialize
        updateSavedDesignsList();
    </script>
    <script src="/are-utils-v2.js"></script>
</body>
</html>
