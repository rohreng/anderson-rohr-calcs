<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counterfort Retaining Wall - Bay Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a1a2e;--surface:#16213e;--accent:#e94560;--accent2:#f5a623;
    --text:#e0e0e0;--dim:#8a8fa8;--pass:#4ecdc4;--fail:#e94560;
    --border:#2a2d4a;--inbg:#0d1b36;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px;}
  .container{max-width:900px;margin:0 auto;}
  header{margin-bottom:28px;border-bottom:2px solid var(--accent);padding-bottom:14px;}
  header h1{font-family:'IBM Plex Mono',monospace;font-size:1.3rem;font-weight:600;color:var(--accent);}
  header p{font-size:0.83rem;color:var(--dim);margin-top:4px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:16px;}
  .ptitle{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent2);margin-bottom:14px;}
  .inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
  @media(max-width:700px){.inputs-grid{grid-template-columns:1fr;}}
  .ig{margin-bottom:9px;display:grid;grid-template-columns:1fr 75px 46px;align-items:center;gap:5px;}
  .ig label{font-size:0.76rem;color:var(--dim);}
  .ig input{font-family:'IBM Plex Mono',monospace;font-size:0.82rem;background:var(--inbg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;text-align:right;width:100%;}
  .ig input:focus{outline:none;border-color:var(--accent);}
  .ig .u{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--dim);}
  hr.sep{border:none;border-top:1px solid var(--border);margin:10px 0;grid-column:1/-1;}
  .btn{width:100%;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:8px;grid-column:1/-1;}
  .btn:hover{background:#d13550;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px;}
  .card h3{font-family:'IBM Plex Mono',monospace;font-size:0.73rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent2);margin-bottom:10px;}
  .eq{font-family:'IBM Plex Mono',monospace;font-size:0.77rem;line-height:1.85;color:var(--dim);margin-left:8px;white-space:pre-wrap;}
  .v{color:#e0e0e0;font-weight:500;} .hi{color:#f5a623;font-weight:600;}
  .ehead{font-family:'IBM Plex Mono',monospace;font-size:0.79rem;color:var(--text);font-weight:600;border-bottom:1px dashed var(--border);display:inline-block;margin-top:8px;margin-bottom:2px;}
  table.st{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:0.77rem;margin-top:8px;}
  table.st th{text-align:left;color:var(--dim);font-weight:500;padding:4px 8px;border-bottom:1px solid var(--border);}
  table.st td{padding:4px 8px;color:var(--text);}
  table.st .tot td{border-top:2px solid var(--accent2);font-weight:600;color:var(--accent2);}
  .status{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:0.79rem;font-weight:600;padding:3px 10px;border-radius:4px;margin-top:6px;}
  .status.pass{background:rgba(78,205,196,0.15);color:var(--pass);border:1px solid var(--pass);}
  .status.fail{background:rgba(233,69,96,0.15);color:var(--fail);border:1px solid var(--fail);}
  .note{background:rgba(233,69,96,0.08);border:1px solid rgba(233,69,96,0.3);border-radius:6px;padding:10px 14px;font-size:0.8rem;line-height:1.5;color:var(--dim);margin-top:10px;}
  .note b{color:var(--accent);}
  .cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:700px){.cmp{grid-template-columns:1fr;}}
  .cbox{border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:var(--surface);}
  .cbox h4{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px;}
  /* ── canonical check-table + expandable calc detail ── */
  .chk-table{width:100%;border-collapse:collapse;font-size:0.8rem;font-family:'IBM Plex Sans',sans-serif;}
  .chk-table th{background:#1e3c72;color:#fff;padding:8px 10px;text-align:left;}
  .chk-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);}
  .chk-table tr.det-row td{padding:0!important;border:none!important;}
  .pass{color:#16a34a;font-weight:700}.fail{color:#dc2626;font-weight:700}.na{color:#9ca3af}
  .dc-bar{height:14px;border-radius:7px;background:#2a2d4a;min-width:70px;overflow:hidden}
  .dc-fill{height:100%;border-radius:7px}
  .dc-cell{display:flex;align-items:center;gap:7px}
  .calc-det{display:none;background:#f4f7ff;padding:13px 18px 10px;border-top:1px dashed #b0c0e8;font-size:0.8rem;color:#1a1a1a;border-radius:0 0 6px 6px;}
  .calc-det.open{display:block}
  .calc-det .pass{color:#16a34a}.calc-det .fail{color:#dc2626}
  .det-btn{background:none;border:1px solid #93c5fd;color:#60a5fa;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:0.72rem;white-space:nowrap;transition:background .15s;width:auto;margin:0;font-family:'IBM Plex Mono',monospace;}
  .det-btn:hover{background:#dbeafe;color:#1e40af}
  .cref-hdr{font-weight:700;color:#1e3c72;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #c7d2e8;font-size:0.82rem}
  .cwb{background:#fff;border:1px solid #c7d2e8;border-radius:5px;padding:8px 12px;margin-top:6px;font-family:'IBM Plex Mono',monospace;}
  .cval{color:#15803d;font-weight:700}
  .csep{border:none;border-top:1px dashed #c7d2e8;margin:7px 0}
  .mrow{margin:3px 0;line-height:1.7}
  @media print { .calc-det{display:block!important} .det-btn{display:none!important} }
</style>
  <link rel="stylesheet" href="./are-calc.css">
  <script src="/are-draw.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>Counterfort Retaining Wall - Full Bay Analysis</h1>
    <p>One counterfort bay with actual footing geometry &middot; 2024 IBC / ACI 318-25</p>
  </header>
  <div class="panel">
    <div class="inputs-grid">
      <div class="ptitle" style="grid-column:1/-1">Material &amp; Soil</div>
      <div class="ig"><label>Conc unit wt, gc</label><input type="number" id="gc" value="150" step="5"><span class="u">pcf</span></div>
      <div class="ig"><label>Equiv fluid, Pa</label><input type="number" id="Pa" value="50" step="5"><span class="u">pcf</span></div>
      <div class="ig"><label>Passive, Pp</label><input type="number" id="Pp" value="350" step="25"><span class="u">psf/ft</span></div>
      <div class="ig"><label>Seismic, PE</label><input type="number" id="PE" value="0" step="5"><span class="u">psf/ft</span></div>
      <div class="ig"><label>Backfill, gb</label><input type="number" id="gb" value="110" step="5"><span class="u">pcf</span></div>
      <div class="ig"><label>Surcharge, ws</label><input type="number" id="ws" value="5" step="5"><span class="u">psf</span></div>
      <div class="ig"><label>Friction, mu</label><input type="number" id="mu" value="0.4" step="0.05"><span class="u">-</span></div>
      <div class="ig"><label>Allow bearing, Qa</label><input type="number" id="Qa" value="3.0" step="0.25"><span class="u">ksf</span></div>
      <hr class="sep">
      <div class="ptitle" style="grid-column:1/-1">Wall &amp; Footing Geometry</div>
      <div class="ig"><label>Wall height, H</label><input type="number" id="H" value="11.67" step="0.25"><span class="u">ft</span></div>
      <div class="ig"><label>Wall thick, tw</label><input type="number" id="tw" value="10" step="1"><span class="u">in</span></div>
      <div class="ig"><label>Ftg thick, hf</label><input type="number" id="hf" value="12" step="1"><span class="u">in</span></div>
      <div class="ig"><label>Key depth, hk</label><input type="number" id="hk" value="0" step="3"><span class="u">in</span></div>
      <div class="ig"><label>Toe width, LT</label><input type="number" id="LT" value="1" step="0.5"><span class="u">ft</span></div>
      <div class="ig"><label>Soil over toe, hp</label><input type="number" id="hp" value="24" step="3"><span class="u">in</span></div>
      <hr class="sep">
      <div class="ptitle" style="grid-column:1/-1">Counterfort &amp; Heel</div>
      <div class="ig"><label>C/F spacing, Sc</label><input type="number" id="Sc" value="10" step="0.5"><span class="u">ft</span></div>
      <div class="ig"><label>C/F web thick, tc</label><input type="number" id="tc" value="10" step="1"><span class="u">in</span></div>
      <div class="ig"><label>C/F ftg pad width, Wpad</label><input type="number" id="Wpad" value="3" step="0.5"><span class="u">ft</span></div>
      <div class="ig"><label>Heel @ C/F, LH_cf</label><input type="number" id="LH_cf" value="4" step="0.5"><span class="u">ft</span></div>
      <div class="ig"><label>Heel betw C/F, LH_bw</label><input type="number" id="LH_bw" value="1" step="0.5"><span class="u">ft</span></div>
      <button class="btn" onclick="calculate()">CALCULATE BAY</button>
    </div>
  </div>
  <div id="out"></div>
</div>
<script>
function gv(id){return parseFloat(document.getElementById(id).value);}
function R(n,d){return d===undefined?n.toFixed(3):n.toFixed(d);}

// canonical 7-col chk-row + det-row pair (display only)
function cfChkRow(id,name,ref,dem,cap,dc,ok,det){
  var dcCell;
  if(isFinite(dc)){
    var col=dc<=0.8?'#16a34a':dc<=1.0?'#d97706':'#dc2626';
    dcCell='<div class="dc-cell"><span style="color:'+(dc<=0.8?'#4ecdc4':dc<=1.0?'#f5a623':'#e94560')+';font-weight:600">'+R(dc,2)+'</span><div class="dc-bar"><div class="dc-fill" style="width:'+Math.min(dc*100,150)+'%;background:'+col+'"></div></div></div>';
  } else { dcCell='<span class="na">&mdash;</span>'; }
  var stxt=ok?'<span class="pass">PASS</span>':'<span class="fail">FAIL</span>';
  return '<tr><td><b>'+name+'</b></td><td>'+ref+'</td><td>'+dem+'</td><td>'+cap+'</td><td>'+dcCell+'</td><td>'+stxt+'</td>'
    +'<td><button class="det-btn" id="dbtn_'+id+'" onclick="toggleDet(\''+id+'\')">&#9656; Calc</button></td></tr>'
    +'<tr class="det-row"><td colspan="7"><div class="calc-det" id="det_'+id+'">'+det+'</div></td></tr>';
}

// =================== SVG DIAGRAMS — AREDraw standard ===================
// Diagram functions return placeholder HTML strings; _renderDiagrams() is
// called after innerHTML is set to populate the SVG DOM into those placeholders.
var _diagramArgs = {};  // keyed by placeholder id

function drawCrossSection(LT,tw,LH_cf,LH_bw,H,hf,hk,hp,Ht,Lcf,Lbw,Pa,Pp,ws,gb){
  _diagramArgs['are-cs-placeholder'] = [LT,tw,LH_cf,LH_bw,H,hf,hk,hp,Ht,Lcf,Lbw,Pa,Pp,ws,gb];
  return '<div id="are-cs-placeholder" class="card" style="min-height:200px"></div>';
}
function _renderCrossSection(el, LT,tw,LH_cf,LH_bw,H,hf,hk,hp,Ht,Lcf,Lbw,Pa,Pp,ws,gb){
  // All geometry in FEET; AREDraw works in INCHES (×12).
  // World origin: x=0 at toe, y=0 at key bottom (or footing bottom when hk=0).
  // flipY:true → +y is UP (engineering convention).
  var AD = window.AREDraw;
  if(!AD){ el.innerHTML='<p style="color:#c42b2b">AREDraw not loaded</p>'; return; }

  var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  el.appendChild(svgEl);

  // Scale: fit wall height in ~340px vertically, total length in ~380px horizontally
  var totalH = (Ht + Math.max(hp, 0) + hk) * 12; // world inches tall
  var totalW = Lcf * 12;
  var scX = 320 / (totalW * 1.1);
  var scY = 340 / (totalH * 1.1);
  var sc  = Math.min(scX, scY, 5.5);

  // Key world Y coords (inches)
  var yKeyBot  = 0;
  var yFtgBot  = hk * 12;
  var yFtgTop  = (hk + hf) * 12;
  var yStemTop = (hk + hf + H) * 12;
  var yToeGrd  = yFtgTop + hp * 12;

  // World X coords (inches from toe)
  var xToe    = 0;
  var xWallF  = LT * 12;
  var xWallB  = (LT + tw) * 12;
  var xHeelCf = (LT + tw + LH_cf) * 12;
  var xHeelBw = (LT + tw + LH_bw) * 12;
  var xStemCL = (xWallF + xWallB) / 2;

  // View: origin placed so figure has room on left for dims, right for callouts
  // ox = 120 (room for left-side dims + lateral force shafts), oy = top margin + totalH*sc
  var ox = 120, oy = 28 + totalH * sc;
  var dwg = new AD.Drawing(svgEl, { margin: 22 });
  var v   = new AD.View(dwg, { scale: sc, ox: ox, oy: oy, flipY: true });
  var st  = v.style;

  // Right-side callout gutter: 70px beyond the right wall of the figure
  var xRightGutterPx = v.px(xHeelCf) + 70;
  // Left-side gutter for labels: 70px left of the toe face
  // Lateral force shafts extend into this region, labels go further left
  var xLeftGutterPx  = v.px(xToe) - 70;

  // Helper: raw SVG element appended to a layer
  function mkEl(tag, attrs, layer){
    var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for(var k in attrs) e.setAttribute(k, String(attrs[k]));
    dwg.add(e, layer || 'anno');
    return e;
  }

  // ── SOIL FILLS ──────────────────────────────────────────────────────────────
  // Retained backfill (behind wall, full height)
  mkEl('rect',{
    x: v.px(xWallB), y: v.py(yStemTop),
    width: v.s(xHeelCf - xWallB),
    height: Math.abs(v.py(yFtgTop) - v.py(yStemTop)),
    fill:'#c8b87a', opacity:'0.30'
  }, 'steel');
  dwg.extend(v.px(xWallB), v.py(yStemTop));
  dwg.extend(v.px(xHeelCf), v.py(yFtgTop));

  // Soil over toe
  if(hp > 0){
    mkEl('rect',{
      x: v.px(xToe), y: v.py(yToeGrd),
      width: v.s(xWallF - xToe),
      height: Math.abs(v.py(yFtgTop) - v.py(yToeGrd)),
      fill:'#c8b87a', opacity:'0.22'
    }, 'steel');
    dwg.extend(v.px(xToe), v.py(yToeGrd));
  }

  // ── CONCRETE MEMBERS ────────────────────────────────────────────────────────
  // Footing slab
  AD.plate(v, xToe, yFtgBot, xHeelCf - xToe, hf * 12, { fill: st.steelFill });
  // Wall stem (primary member — amber)
  AD.plate(v, xWallF, yFtgTop, tw * 12, H * 12, { highlight: true });
  // Key (if any)
  if(hk > 0) AD.plate(v, xWallF, yKeyBot, tw * 12, hk * 12, { fill: st.steelFill });

  // Counterfort web outline (dashed hidden line — sits behind footing in this view)
  mkEl('rect',{
    x: v.px(xWallB), y: v.py(yStemTop),
    width: v.s(LH_cf * 12),
    height: Math.abs(v.py(yFtgTop) - v.py(yStemTop)),
    fill:'none', stroke: st.dim, 'stroke-width':'1', 'stroke-dasharray':'6 3'
  }, 'steel');

  // Dashed line for heel-end between counterforts
  mkEl('line',{
    x1: v.px(xHeelBw), y1: v.py(yFtgTop),
    x2: v.px(xHeelBw), y2: v.py(yFtgBot),
    stroke: st.force, 'stroke-width':'1.5', 'stroke-dasharray':'5 3'
  });
  dwg.extend(v.px(xHeelBw), v.py(yFtgTop));

  // ── GRADE LINES ─────────────────────────────────────────────────────────────
  // Backfill grade (behind wall at stem top)
  mkEl('line',{
    x1: v.px(xWallB), y1: v.py(yStemTop),
    x2: v.px(xHeelCf + 6), y2: v.py(yStemTop),
    stroke:'#5a8a3a', 'stroke-width':'2', 'stroke-dasharray':'8 4'
  });
  dwg.extend(v.px(xHeelCf + 6), v.py(yStemTop));
  // Toe grade
  if(hp > 0){
    mkEl('line',{
      x1: v.px(xToe - 6), y1: v.py(yToeGrd),
      x2: v.px(xWallF), y2: v.py(yToeGrd),
      stroke:'#5a8a3a', 'stroke-width':'2', 'stroke-dasharray':'8 4'
    });
    dwg.extend(v.px(xToe - 6), v.py(yToeGrd));
  }

  // ── CENTERLINES ─────────────────────────────────────────────────────────────
  AD.centerline(v, xStemCL, yFtgBot, xStemCL, yStemTop + 3);
  AD.centerline(v, xToe - 3, (yFtgBot + yFtgTop)/2, xHeelCf + 3, (yFtgBot + yFtgTop)/2);

  // ── SURCHARGE DISTRIBUTED LOAD (on retained soil top) ────────────────────
  // distLoad label only goes above backfill grade line — always outside the soil
  AD.distLoad(v, xWallB, xHeelCf, yStemTop, 28, 'ws = '+ws+' psf', { color: st.force });

  // ── EARTH PRESSURE (triangular) — arrows start LEFT of wall face, tip at face ──
  // The pressure diagram triangle shows the load *intensity* profile: the sloped
  // boundary and fill extend rightward from the wall back-face into the soil for
  // visual reference only.  The actual force arrows (shafts + heads) are moved so
  // their shafts live entirely to the LEFT of the wall back face, with arrowheads
  // just touching the wall face.  Label goes to the RIGHT gutter via calloutLabel.
  var nEP = 6;
  var maxArrowLen = 50; // px — max shaft length in left margin
  for(var iep = 0; iep <= nEP; iep++){
    var fracY  = iep / nEP;
    var yEP    = yFtgTop + fracY * Ht * 12;
    var arLen  = (1 - fracY) * maxArrowLen;
    if(arLen < 4) continue;
    // shaft entirely left of wall face: x2 = wall face, x1 = wall face - arLen
    mkEl('line',{
      x1: v.px(xWallB) - arLen, y1: v.py(yEP),
      x2: v.px(xWallB) - 2,     y2: v.py(yEP),
      stroke: st.force, 'stroke-width': iep===0 ? '1.5' : '1',
      'marker-end':'url(#areArrForce)'
    });
    dwg.extend(v.px(xWallB) - arLen, v.py(yEP));
  }
  // Sloped "intensity" boundary line in the left margin (not crossing soil)
  mkEl('line',{
    x1: v.px(xWallB) - maxArrowLen, y1: v.py(yFtgTop),
    x2: v.px(xWallB) - 2,           y2: v.py(yStemTop),
    stroke: st.force, 'stroke-width':'1.2', opacity:'0.55'
  });
  // ── RIGHT-GUTTER callout baseline: top of stem in screen coords, step down 18px per label
  // This guarantees no two labels share the same pixel row.
  var _rgY = v.py(yStemTop) - 4; // starting just above stem top in screen
  function nextRgY(){ _rgY += 18; return _rgY; }

  // Hb callout — RIGHT gutter at resultant height (Ht/3 from base)
  var yHbRes = yFtgTop + (Ht/3) * 12;
  var _hbLblY = Math.max(v.py(yHbRes), nextRgY());
  AD.calloutLabel(v, xWallB, yHbRes,
    xRightGutterPx, _hbLblY,
    'Hb (active earth)', { color: st.force, anchor:'start' });

  // ── Hs SURCHARGE LATERAL — uniform band, shaft left of wall face ──────────
  // Uniform band: thin rect shown in the LEFT margin (not on soil)
  mkEl('rect',{
    x: v.px(xWallB) - 16, y: v.py(yStemTop),
    width: 14,
    height: Math.abs(v.py(yFtgTop) - v.py(yStemTop)),
    fill: st.force, opacity:'0.12',
    stroke: st.force, 'stroke-width':'0.6', 'stroke-dasharray':'3 2'
  });
  dwg.extend(v.px(xWallB) - 16, v.py(yStemTop));
  // Hs callout — RIGHT gutter, staggered below Hb
  var yHsMid = yStemTop - Ht*12*0.5;
  AD.calloutLabel(v, xWallB, yHsMid,
    xRightGutterPx, nextRgY(),
    'Hs (surcharge lateral)', { color: st.force, anchor:'start' });

  // ── PASSIVE RESISTANCE — arrows extend LEFT from toe face into left margin ─
  var dpas = (hp + hf + hk) * 12; // inches
  if(dpas > 0){
    var nPP = 5;
    var maxPLen = 38; // px in left margin
    for(var ipp = 1; ipp <= nPP; ipp++){
      var fracP = ipp / nPP;
      var yPas  = yKeyBot + fracP * dpas;
      var pLen  = fracP * maxPLen;
      // Shaft goes left from toe face: x1 = face - pLen, x2 = face (arrowhead at wall toe)
      mkEl('line',{
        x1: v.px(xWallF) - pLen, y1: v.py(yPas),
        x2: v.px(xWallF) - 2,    y2: v.py(yPas),
        stroke: st.dim, 'stroke-width':'1', 'marker-end':'url(#areArrForce)'
      });
      dwg.extend(v.px(xWallF) - pLen, v.py(yPas));
    }
    // Sloped intensity boundary in left margin
    mkEl('line',{
      x1: v.px(xWallF) - 2,       y1: v.py(yKeyBot),
      x2: v.px(xWallF) - maxPLen, y2: v.py(yKeyBot + dpas),
      stroke: st.dim, 'stroke-width':'1.2', opacity:'0.55'
    });
    // Hp callout — LEFT gutter, leader from toe face at 1/3 height
    // Place label further left than the arrow shafts
    var yHpRes = yKeyBot + dpas * 0.33;
    AD.calloutLabel(v, xWallF, yHpRes,
      xLeftGutterPx, v.py(yHpRes),
      'Hp (passive)', { color: st.dim, anchor:'end' });
  }

  // ── GRAVITY LOADS (downward arrows through member centroids) ─────────────
  // Wb — backfill on heel: arrow on centroid, callout RIGHT gutter (staggered)
  var xWbC = (xWallB + xHeelCf) / 2;
  AD.forceArrow(v, xWbC, yStemTop - H*12*0.25, 0, -1, 48, '', { color: st.dim });
  AD.calloutLabel(v, xWbC, yStemTop - H*12*0.5,
    xRightGutterPx, nextRgY(),
    'Wb (backfill)', { color: st.dim, anchor:'start' });

  // Ww — wall stem: arrow on centroid, callout LEFT gutter (independent of right stack)
  AD.forceArrow(v, xStemCL, yFtgTop + H*12*0.65, 0, -1, 42, '', { color: st.dim });
  AD.calloutLabel(v, xStemCL, yFtgTop + H*12*0.55,
    xLeftGutterPx, v.py(yFtgTop + H*12*0.55),
    'Ww (wall)', { color: st.dim, anchor:'end' });

  // Wf — footing: arrow on centroid, callout RIGHT gutter (staggered)
  var xFtgCL = (xToe + xHeelCf) / 2;
  AD.forceArrow(v, xFtgCL, (yFtgBot+yFtgTop)/2, 0, -1, 32, '', { color: st.dim });
  AD.calloutLabel(v, xFtgCL, (yFtgBot+yFtgTop)/2,
    xRightGutterPx, nextRgY(),
    'Wf (footing)', { color: st.dim, anchor:'start' });

  // ── DIMENSIONS ───────────────────────────────────────────────────────────
  // Left side: H (wall height), hf, hp (soil over toe), hk (key)
  // Stagger at increasing offsets so they don't touch
  AD.dimLine(v, xToe, yFtgTop, xToe, yStemTop, R(H,2)+"'",      { off: -42 });
  AD.dimLine(v, xToe, yFtgBot, xToe, yFtgTop,  R(hf*12,0)+'"',  { off: -28 });
  if(hp > 0) AD.dimLine(v, xToe, yFtgTop, xToe, yToeGrd, R(hp*12,0)+'"', { off: -60 });
  if(hk > 0) AD.dimLine(v, xToe, yKeyBot, xToe, yFtgBot,  R(hk*12,0)+'"', { off: -28 });

  // Bottom dims: LT | tw | LH_cf  (all at footing bottom, stacked BELOW → positive off
  // so dim lines push downward in screen coords, clear of the filled footing slab)
  AD.dimLine(v, xToe,   yFtgBot, xWallF,   yFtgBot, R(LT,1)+"'",                { off: 26 });
  AD.dimLine(v, xWallF, yFtgBot, xWallB,   yFtgBot, R(tw*12,0)+'"',              { off: 26 });
  AD.dimLine(v, xWallB, yFtgBot, xHeelCf,  yFtgBot, 'LH_cf '+R(LH_cf,1)+"'",    { off: 26 });
  // LH_bw at second tier below
  AD.dimLine(v, xWallB, yFtgBot, xHeelBw,  yFtgBot, 'LH_bw '+R(LH_bw,1)+"'",    { off: 46 });
  // Total Lcf at third tier
  AD.dimLine(v, xToe,   yFtgBot, xHeelCf,  yFtgBot, 'Lcf = '+R(Lcf,2)+"'",      { off: 66 });

  // Heel-end-between-c/f marker: callout from the dashed line out to the RIGHT gutter (staggered)
  AD.calloutLabel(v, xHeelBw, yFtgTop,
    xRightGutterPx, nextRgY(),
    'heel end betw c/f', { color: st.force, anchor:'start' });

  // ── γb callout — RIGHT gutter (staggered, no text on the soil zone) ───────
  var yGbMid = yStemTop - H*12*0.5;
  AD.calloutLabel(v, (xWallB+xHeelCf)/2, yGbMid,
    xRightGutterPx, nextRgY(),
    'γb = '+gb+' pcf', { color:'#8a7a50', anchor:'start' });

  // ── VIEW TITLE (below figure, underlined) ─────────────────────────────────
  var titleX = v.px((xToe + xHeelCf) / 2);
  var titleY = v.py(yKeyBot) + 88; // 88px below key bottom = safely below three dim tiers
  AD.viewTitle(v, titleX, titleY, 'CROSS SECTION AT COUNTERFORT');
  dwg.extend(titleX - 130, titleY + 12);
  dwg.extend(titleX + 130, titleY + 12);

  dwg.commit();
}

function drawPlanView(LT,tw,LH_cf,LH_bw,tc,Wpad,Sc,clr,Lcf,Lbw){
  _diagramArgs['are-pv-placeholder'] = [LT,tw,LH_cf,LH_bw,tc,Wpad,Sc,clr,Lcf,Lbw];
  return '<div id="are-pv-placeholder" class="card" style="min-height:200px"></div>';
}
function _renderPlanView(el, LT,tw,LH_cf,LH_bw,tc,Wpad,Sc,clr,Lcf,Lbw){
  // Plan view: x = 0 at toe, y = 0 at near edge of first counterfort pad.
  // Bay total y-span = Sc*12".  flipY:true → +y points "away" from viewer (up in screen).
  var AD = window.AREDraw;
  if(!AD){ el.innerHTML='<p style="color:#c42b2b">AREDraw not loaded</p>'; return; }

  var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  el.appendChild(svgEl);

  // Scale
  var scX = 400 / (Lcf * 12 * 1.15);
  var scY = 260 / (Sc  * 12 * 1.1);
  var sc  = Math.min(scX, scY, 6);

  // World coords (inches)
  var xToe   = 0;
  var xWallF = LT * 12;
  var xWallB = (LT + tw) * 12;
  var xHlCf  = (LT + tw + LH_cf) * 12;
  var xHlBw  = (LT + tw + LH_bw) * 12;

  var yPad1B = 0;
  var yPad1T = Wpad * 12;
  var yClrB  = yPad1T;
  var yClrT  = (Wpad + clr) * 12;
  var yPad2B = yClrT;
  var yPad2T = Sc * 12;

  var yWebOff = (Wpad - tc) / 2 * 12;
  var yWeb1B  = yPad1B + yWebOff;
  var yWeb1T  = yWeb1B + tc * 12;
  var yWeb2B  = yPad2B + yWebOff;
  var yWeb2T  = yWeb2B + tc * 12;

  // ox generous left margin for bottom dims; oy at bottom of bay + room for bottom dims
  var ox = 105, oy = 28 + Sc * 12 * sc;
  var dwg = new AD.Drawing(svgEl, { margin: 22 });
  var v   = new AD.View(dwg, { scale: sc, ox: ox, oy: oy, flipY: true });
  var st  = v.style;

  function mkEl(tag, attrs, layer){
    var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for(var k in attrs) e.setAttribute(k, String(attrs[k]));
    dwg.add(e, layer || 'anno');
    return e;
  }

  // ── CONCRETE FILLS ──────────────────────────────────────────────────────────
  AD.plate(v, xToe, yPad1B, Lcf*12, yPad1T-yPad1B, { fill: st.steelFill });
  AD.plate(v, xToe, yClrB,  Lbw*12, yClrT-yClrB,   { fill: '#dbe2f0' });
  AD.plate(v, xToe, yPad2B, Lcf*12, yPad2T-yPad2B, { fill: st.steelFill });

  // ── COUNTERFORT WEBS (dashed — above footing slab in elevation, shown hidden in plan) ─
  [
    [yWeb1B, yWeb1T],
    [yWeb2B, yWeb2T]
  ].forEach(function(yw){
    mkEl('rect',{
      x: v.px(xWallB), y: v.py(yw[1]),
      width: v.s(LH_cf*12),
      height: Math.abs(v.py(yw[0]) - v.py(yw[1])),
      fill: st.steelFillHi, opacity:'0.75',
      stroke: st.steel, 'stroke-width':'1.5', 'stroke-dasharray':'6 3'
    }, 'steel');
    dwg.extend(v.px(xWallB), v.py(yw[1]));
    dwg.extend(v.px(xHlCf), v.py(yw[0]));
  });

  // ── WALL STEM (continuous, amber — primary member) ─────────────────────────
  mkEl('rect',{
    x: v.px(xWallF), y: v.py(yPad2T),
    width: v.s(tw*12),
    height: Math.abs(v.py(yPad1B) - v.py(yPad2T)),
    fill: st.steelFillHi, stroke: st.steel, 'stroke-width':'2'
  }, 'steel');
  dwg.extend(v.px(xWallF), v.py(yPad2T));
  dwg.extend(v.px(xWallB), v.py(yPad1B));

  // ── CENTERLINES ─────────────────────────────────────────────────────────────
  AD.centerline(v, xToe-3, (yPad1B+yPad1T)/2, xHlCf+3, (yPad1B+yPad1T)/2);
  AD.centerline(v, xToe-3, (yPad2B+yPad2T)/2, xHlCf+3, (yPad2B+yPad2T)/2);
  AD.centerline(v, (xWallF+xWallB)/2, yPad1B-3, (xWallF+xWallB)/2, yPad2T+3);

  // ── LABELS (callouts into clear gutters) ───────────────────────────────────
  // Counterfort pad 1 — label goes LEFT of the figure
  AD.calloutLabel(v, (xToe+xHlCf)/2, (yPad1B+yPad1T)/2,
    v.px(xToe) - 55, v.py((yPad1B+yPad1T)/2),
    'c/f pad  '+R(Lcf,2)+"'×"+R(Wpad,1)+"'",
    { color: st.steel, anchor:'end' });

  // Between-c/f zone — label LEFT
  AD.calloutLabel(v, (xToe+xHlBw)/2, (yClrB+yClrT)/2,
    v.px(xToe) - 55, v.py((yClrB+yClrT)/2),
    'ftg betw c/f  '+R(Lbw,2)+"'×"+R(clr,2)+"'",
    { color: st.dim, anchor:'end' });

  // Wall stem label — above the pad (top gutter)
  AD.calloutLabel(v, (xWallF+xWallB)/2, yPad2T,
    v.px((xWallF+xWallB)/2), v.py(yPad2T) - 26,
    'wall stem', { color: st.steel, anchor:'middle' });

  // C/F web label — top gutter (moved away from right-gutter Wpad dim)
  AD.calloutLabel(v, xWallB+LH_cf*12*0.5, (yWeb1B+yWeb1T)/2,
    v.px(xWallB+LH_cf*12*0.5), v.py(yPad2T) - 42,
    'c/f web  tc='+R(tc*12,0)+'"', { color: st.dim, anchor:'middle' });

  // ── DIMENSIONS ───────────────────────────────────────────────────────────
  // Bottom (x): LT | tw | LH_cf, then LH_bw and total Lcf stacked BELOW → positive off
  // so dim lines push downward in screen coords, clear of the filled footing pad
  var dY0 = yPad1B;   // at the pad bottom face (y=0 in world)
  AD.dimLine(v, xToe,  dY0, xWallF, dY0, R(LT,1)+"'",              { off: 28 });
  AD.dimLine(v, xWallF,dY0, xWallB, dY0, R(tw*12,0)+'"',             { off: 28 });
  AD.dimLine(v, xWallB,dY0, xHlCf,  dY0, 'LH_cf '+R(LH_cf,1)+"'",   { off: 28 });
  AD.dimLine(v, xWallB,dY0, xHlBw,  dY0, 'LH_bw '+R(LH_bw,1)+"'",   { off: 48 });
  AD.dimLine(v, xToe,  dY0, xHlCf,  dY0, 'Lcf = '+R(Lcf,2)+"'",     { off: 68 });

  // Right (y): Wpad | clr | Sc
  var dXR = xHlCf + 1.5*12;
  AD.dimLine(v, dXR, yPad1B, dXR, yPad1T, 'Wpad '+R(Wpad,1)+"'",  { off: 30 });
  AD.dimLine(v, dXR, yClrB,  dXR, yClrT,  'clr '+R(clr,2)+"'",    { off: 30 });
  AD.dimLine(v, dXR+2*12, yPad1B, dXR+2*12, yPad2T, 'Sc = '+R(Sc,1)+"'", { off: 50 });

  // tc dim on web — on the RIGHT side of the web, offset outward (positive = rightward for vertical)
  AD.dimLine(v, xWallB+LH_cf*6, yWeb1B, xWallB+LH_cf*6, yWeb1T,
    'tc '+R(tc*12,0)+'"', { off: 46 });

  // ── VIEW TITLE (below figure, underlined) ─────────────────────────────────
  var titleX = v.px((xToe + xHlCf) / 2);
  var titleY = v.py(yPad1B) + 95;   // below three tiers of bottom dims
  AD.viewTitle(v, titleX, titleY, 'PLAN VIEW — ONE BAY (FOOTING)');
  dwg.extend(titleX - 110, titleY + 12);
  dwg.extend(titleX + 110, titleY + 12);

  dwg.commit();
}

// After innerHTML is set, render diagrams into their placeholder divs
function _renderDiagrams(){
  var cs = document.getElementById('are-cs-placeholder');
  if(cs){ var a = _diagramArgs['are-cs-placeholder']; if(a) _renderCrossSection.apply(null, [cs].concat(a)); }
  var pv = document.getElementById('are-pv-placeholder');
  if(pv){ var b = _diagramArgs['are-pv-placeholder']; if(b) _renderPlanView.apply(null, [pv].concat(b)); }
}

// =================== MAIN CALCULATION ===================

function calculate(){
  try{
  var gc=gv('gc'),Pa=gv('Pa'),Pp=gv('Pp'),PE=gv('PE'),gb=gv('gb'),ws=gv('ws'),mu=gv('mu'),Qa=gv('Qa');
  var H=gv('H'),tw_in=gv('tw'),hf_in=gv('hf'),hk_in=gv('hk'),hp_in=gv('hp'),tc_in=gv('tc');
  var LT=gv('LT'),Sc=gv('Sc'),LH_cf=gv('LH_cf'),LH_bw=gv('LH_bw'),Wpad=gv('Wpad');

  var tw=tw_in/12, hf=hf_in/12, hk=hk_in/12, hp=hp_in/12, tc=tc_in/12;
  var Ht=H+hf;
  // KEY GEOMETRY CHANGE:
  // Wpad = counterfort footing pad width (e.g. 3 ft), centered on tc web
  // clr = clear between pads = Sc - Wpad
  var clr=Sc-Wpad;
  var Lcf=LT+tw+LH_cf;  // footing length at counterfort
  var Lbw=LT+tw+LH_bw;  // footing length between counterforts
  var Aftg=Lcf*Wpad + Lbw*clr;  // total footing plan area per bay
  var Lavg=Aftg/Sc;
  var Aheel=LH_cf*Wpad + LH_bw*clr;

  var o='';

  // 1. GEOMETRY
  o+='<div class="card"><h3>1. Bay Geometry</h3><div class="eq">';
  o+='<span class="ehead">Unit Conversions</span>\n';
  o+='tw = '+tw_in+'"/12 = <span class="v">'+R(tw)+' ft</span>\n';
  o+='hf = '+hf_in+'"/12 = <span class="v">'+R(hf)+' ft</span>\n';
  o+='hk = '+hk_in+'"/12 = <span class="v">'+R(hk)+' ft</span>\n';
  o+='hp = '+hp_in+'"/12 = <span class="v">'+R(hp)+' ft</span>\n';
  o+='tc = '+tc_in+'"/12 = <span class="v">'+R(tc)+' ft</span> (web thickness)\n\n';
  o+='<span class="ehead">Bay Dimensions</span>\n';
  o+='H_total = H+hf = '+R(H,2)+'+'+R(hf)+' = <span class="v">'+R(Ht)+' ft</span>\n';
  o+='C/F pad width (Wpad) = <span class="v">'+R(Wpad,1)+' ft</span> (centered on '+R(tc)+' ft web)\n';
  o+='Clear between pads = Sc-Wpad = '+R(Sc,1)+'-'+R(Wpad,1)+' = <span class="v">'+R(clr)+' ft</span>\n';
  o+='Ftg L @ c/f (Lcf) = LT+tw+LH_cf = '+R(LT,1)+'+'+R(tw)+'+'+R(LH_cf,1)+' = <span class="v">'+R(Lcf)+' ft</span>\n';
  o+='Ftg L betw (Lbw) = LT+tw+LH_bw = '+R(LT,1)+'+'+R(tw)+'+'+R(LH_bw,1)+' = <span class="v">'+R(Lbw)+' ft</span>\n\n';
  o+='<span class="ehead">Plan Areas (per bay)</span>\n';
  o+='Ftg area = Lcf*Wpad + Lbw*clr\n';
  o+='         = '+R(Lcf)+'*'+R(Wpad,1)+' + '+R(Lbw)+'*'+R(clr)+'\n';
  o+='         = '+R(Lcf*Wpad)+' + '+R(Lbw*clr)+' = <span class="v">'+R(Aftg)+' sf</span>\n';
  o+='Heel area = LH_cf*Wpad + LH_bw*clr\n';
  o+='          = '+R(LH_cf,1)+'*'+R(Wpad,1)+' + '+R(LH_bw,1)+'*'+R(clr)+'\n';
  o+='          = '+R(LH_cf*Wpad)+' + '+R(LH_bw*clr)+' = <span class="v">'+R(Aheel)+' sf</span>\n';
  o+='Avg ftg L = Aftg/Sc = '+R(Aftg)+'/'+R(Sc,1)+' = <span class="v">'+R(Lavg)+' ft</span>';
  o+='</div></div>';

  // DIAGRAMS
  o+=drawCrossSection(LT,tw,LH_cf,LH_bw,H,hf,hk,hp,Ht,Lcf,Lbw,Pa,Pp,ws,gb);
  o+=drawPlanView(LT,tw,LH_cf,LH_bw,tc,Wpad,Sc,clr,Lcf,Lbw);

  // 2. DRIVING FORCES
  var Hb=0.5*Pa*Ht*Ht*Sc/1000, yHb=Ht/3;
  var Hs=ws*(Pa/gb)*Ht*Sc/1000, yHs=Ht/2;
  var HE=0.5*PE*Ht*Ht*Sc/1000, yHE=2*Ht/3;
  var sumH=Hb+Hs+HE;
  var Mot=Hb*yHb+Hs*yHs+HE*yHE;

  o+='<div class="card"><h3>2. Driving Forces (per bay = '+R(Sc,1)+' ft)</h3><div class="eq">';
  o+='All lateral loads act on full bay width Sc = '+R(Sc,1)+' ft.\n\n';
  o+='<span class="ehead">Hb - Active Soil (triangular)</span>\n';
  o+='Hb = 0.5*Pa*Ht^2*Sc = 0.5*'+Pa+'*'+R(Ht)+'^2*'+R(Sc,1)+'/1000 = <span class="hi">'+R(Hb)+' kips</span>\n';
  o+='y_Hb = Ht/3 = <span class="v">'+R(yHb)+' ft</span>,  M_Hb = '+R(Hb)+'*'+R(yHb)+' = <span class="v">'+R(Hb*yHb)+' ft-k</span>\n\n';
  o+='<span class="ehead">Hs - Surcharge Lateral (uniform)</span>\n';
  o+='Hs = ws*(Pa/gb)*Ht*Sc = '+ws+'*('+Pa+'/'+gb+')*'+R(Ht)+'*'+R(Sc,1)+'/1000 = <span class="hi">'+R(Hs)+' kips</span>\n';
  o+='y_Hs = Ht/2 = <span class="v">'+R(yHs)+' ft</span>,  M_Hs = <span class="v">'+R(Hs*yHs)+' ft-k</span>\n\n';
  o+='<span class="ehead">HE - Seismic</span>\n';
  o+='HE = 0.5*PE*Ht^2*Sc = 0.5*'+PE+'*'+R(Ht*Ht)+'*'+R(Sc,1)+'/1000 = <span class="hi">'+R(HE)+' kips</span>\n\n';
  o+='<span class="ehead">Totals</span>\n';
  o+='Sum(H) = <span class="hi">'+R(sumH)+' kips</span>\n';
  o+='M_OT = '+R(Hb*yHb)+'+'+R(Hs*yHs)+'+'+R(HE*yHE)+' = <span class="hi">'+R(Mot)+' ft-k</span>';
  o+='</div></div>';

  // 3. PASSIVE
  var dpas=hp+hf+hk;
  var Hpas=0.5*Pp*dpas*dpas*Sc/1000, yHp=dpas/3;
  var MHp=Hpas*yHp;

  o+='<div class="card"><h3>3. Passive Resistance (per bay)</h3><div class="eq">';
  o+='Hp = 0.5*Pp*(hp+hf+hk)^2*Sc = 0.5*'+Pp+'*'+R(dpas)+'^2*'+R(Sc,1)+'/1000 = <span class="hi">'+R(Hpas)+' kips</span>\n';
  o+='y_Hp = '+R(dpas)+'/3 = <span class="v">'+R(yHp)+' ft</span>,  M_Hp = <span class="hi">'+R(MHp)+' ft-k</span>';
  o+='</div></div>';

  // 4. RESISTING WEIGHTS
  // At counterfort pad (Wpad wide), between pads (clr wide)

  // Ws - surcharge on heel
  var Wscf=ws*LH_cf*Wpad/1000, Wsbw=ws*LH_bw*clr/1000, Wstot=Wscf+Wsbw;
  var xWscf=LT+tw+LH_cf/2, xWsbw=LT+tw+LH_bw/2;
  var MWs=Wscf*xWscf+Wsbw*xWsbw;

  // Wb - backfill on heel
  var Wbcf=gb*H*LH_cf*Wpad/1000, Wbbw=gb*H*LH_bw*clr/1000, Wbtot=Wbcf+Wbbw;
  var xWbcf=LT+tw+LH_cf/2, xWbbw=LT+tw+LH_bw/2;
  var MWb=Wbcf*xWbcf+Wbbw*xWbbw;

  // Wf - footing self weight
  var Wfcf=gc*hf*Lcf*Wpad/1000, Wfbw=gc*hf*Lbw*clr/1000, Wftot=Wfcf+Wfbw;
  var xWfcf=Lcf/2, xWfbw=Lbw/2;
  var MWf=Wfcf*xWfcf+Wfbw*xWfbw;

  // Ww - wall (continuous across Sc)
  var Ww=gc*tw*H*Sc/1000, xWw=LT+tw/2, MWw=Ww*xWw;

  // Wc - counterfort net (gc-gb), triangular: 0.5*H*LH_cf*tc*(gc-gb)
  // Note: uses tc (web thickness), not Wpad, because only the web displaces soil
  var Wc=0.5*H*LH_cf*tc*(gc-gb)/1000, xWc=LT+tw+(2/3)*LH_cf, MWc=Wc*xWc;

  // Wk - key
  var Wk=gc*hk*tw*Sc/1000, xWk=LT+tw/2, MWk=Wk*xWk;

  // Wt - soil over toe (continuous)
  var Wt=gb*hp*LT*Sc/1000, xWt=LT/2, MWt=Wt*xWt;

  var SW=Wstot+Wbtot+Wftot+Ww+Wc+Wk+Wt;
  var MR=MWs+MWb+MWf+MWw+MWc+MWk+MWt;

  o+='<div class="card"><h3>4. Resisting Weights &amp; Moments (per bay) - Detailed</h3><div class="eq">';
  o+='Reference: x=0 at toe. Moments about toe.\n';
  o+='C/F pad: '+R(Wpad,1)+' ft wide, '+R(LH_cf,1)+' ft heel\n';
  o+='Between: '+R(clr)+' ft wide, '+R(LH_bw,1)+' ft heel\n\n';

  o+='<span class="ehead">Ws - Surcharge on Heel</span>\n';
  o+='At pad: Ws,cf = ws*LH_cf*Wpad = '+ws+'*'+R(LH_cf,1)+'*'+R(Wpad,1)+'/1000 = <span class="v">'+R(Wscf)+' k</span>\n';
  o+='  arm = LT+tw+LH_cf/2 = <span class="v">'+R(xWscf)+' ft</span>\n';
  o+='Between: Ws,bw = ws*LH_bw*clr = '+ws+'*'+R(LH_bw,1)+'*'+R(clr)+'/1000 = <span class="v">'+R(Wsbw)+' k</span>\n';
  o+='  arm = LT+tw+LH_bw/2 = <span class="v">'+R(xWsbw)+' ft</span>\n';
  o+='Ws = <span class="hi">'+R(Wstot)+' k</span>, M_Ws = <span class="hi">'+R(MWs)+' ft-k</span>\n\n';

  o+='<span class="ehead">Wb - Backfill on Heel</span>\n';
  o+='At pad: Wb,cf = gb*H*LH_cf*Wpad = '+gb+'*'+R(H,2)+'*'+R(LH_cf,1)+'*'+R(Wpad,1)+'/1000 = <span class="v">'+R(Wbcf)+' k</span>\n';
  o+='  arm = <span class="v">'+R(xWbcf)+' ft</span>\n';
  o+='Between: Wb,bw = gb*H*LH_bw*clr = '+gb+'*'+R(H,2)+'*'+R(LH_bw,1)+'*'+R(clr)+'/1000 = <span class="v">'+R(Wbbw)+' k</span>\n';
  o+='  arm = <span class="v">'+R(xWbbw)+' ft</span>\n';
  o+='Wb = '+R(Wbcf)+'+'+R(Wbbw)+' = <span class="hi">'+R(Wbtot)+' k</span>\n';
  o+='M_Wb = '+R(Wbcf)+'*'+R(xWbcf)+'+'+R(Wbbw)+'*'+R(xWbbw)+' = '+R(Wbcf*xWbcf)+'+'+R(Wbbw*xWbbw)+' = <span class="hi">'+R(MWb)+' ft-k</span>\n\n';

  o+='<span class="ehead">Wf - Footing Self-Weight</span>\n';
  o+='At pad: Wf,cf = gc*hf*Lcf*Wpad = '+gc+'*'+R(hf)+'*'+R(Lcf)+'*'+R(Wpad,1)+'/1000 = <span class="v">'+R(Wfcf)+' k</span>\n';
  o+='  arm = Lcf/2 = <span class="v">'+R(xWfcf)+' ft</span>\n';
  o+='Between: Wf,bw = gc*hf*Lbw*clr = '+gc+'*'+R(hf)+'*'+R(Lbw)+'*'+R(clr)+'/1000 = <span class="v">'+R(Wfbw)+' k</span>\n';
  o+='  arm = Lbw/2 = <span class="v">'+R(xWfbw)+' ft</span>\n';
  o+='Wf = <span class="hi">'+R(Wftot)+' k</span>, M_Wf = <span class="hi">'+R(MWf)+' ft-k</span>\n\n';

  o+='<span class="ehead">Ww - Wall (continuous, Sc wide)</span>\n';
  o+='Ww = gc*tw*H*Sc = '+gc+'*'+R(tw)+'*'+R(H,2)+'*'+R(Sc,1)+'/1000 = <span class="hi">'+R(Ww)+' k</span>\n';
  o+='arm = '+R(xWw)+' ft, M_Ww = <span class="hi">'+R(MWw)+' ft-k</span>\n\n';

  o+='<span class="ehead">Wc - Counterfort Net (gc-gb, triangular, web only)</span>\n';
  o+='Wc = 0.5*H*LH_cf*tc*(gc-gb) = 0.5*'+R(H,2)+'*'+R(LH_cf,1)+'*'+R(tc)+'*('+gc+'-'+gb+')/1000 = <span class="hi">'+R(Wc)+' k</span>\n';
  o+='arm = '+R(xWc)+' ft, M_Wc = <span class="hi">'+R(MWc)+' ft-k</span>\n\n';

  o+='<span class="ehead">Wk - Key</span>\n';
  o+='Wk = gc*hk*tw*Sc = '+gc+'*'+R(hk)+'*'+R(tw)+'*'+R(Sc,1)+'/1000 = <span class="hi">'+R(Wk)+' k</span>\n\n';

  o+='<span class="ehead">Wt - Soil Over Toe (continuous)</span>\n';
  o+='Wt = gb*hp*LT*Sc = '+gb+'*'+R(hp)+'*'+R(LT,1)+'*'+R(Sc,1)+'/1000 = <span class="hi">'+R(Wt)+' k</span>\n';
  o+='arm = LT/2 = <span class="v">'+R(xWt)+' ft</span>, M_Wt = <span class="hi">'+R(MWt)+' ft-k</span>';
  o+='</div>';

  o+='<br><table class="st">';
  o+='<tr><th>Component</th><th>W (kips)</th><th>M (ft-k)</th></tr>';
  o+='<tr><td>Ws (surcharge)</td><td>'+R(Wstot)+'</td><td>'+R(MWs)+'</td></tr>';
  o+='<tr><td>Wb (soil/heel)</td><td>'+R(Wbtot)+'</td><td>'+R(MWb)+'</td></tr>';
  o+='<tr><td>Wf (footing)</td><td>'+R(Wftot)+'</td><td>'+R(MWf)+'</td></tr>';
  o+='<tr><td>Ww (wall)</td><td>'+R(Ww)+'</td><td>'+R(MWw)+'</td></tr>';
  o+='<tr><td>Wc (counterfort)</td><td>'+R(Wc)+'</td><td>'+R(MWc)+'</td></tr>';
  o+='<tr><td>Wk (key)</td><td>'+R(Wk)+'</td><td>'+R(MWk)+'</td></tr>';
  o+='<tr><td>Wt (soil/toe)</td><td>'+R(Wt)+'</td><td>'+R(MWt)+'</td></tr>';
  o+='<tr class="tot"><td>TOTAL</td><td>'+R(SW)+'</td><td>'+R(MR)+'</td></tr>';
  o+='</table></div>';

  // 5-7. STABILITY CHECKS — canonical chk-table with expandable det panels
  // (all math identical to v4; only the rendering changed)
  var SFot=(MR+MHp)/Mot;
  var detOT='<div class="cref-hdr">Overturning — IBC 1807.2.3 (moments about toe)</div><div class="cwb">'
    +'<div class="mrow">M_resist = &Sigma;M_W + M_Hp = '+R(MR)+' + '+R(MHp)+' = <span class="cval">'+R(MR+MHp)+' ft-k</span></div>'
    +'<div class="mrow">M_OT = Hb&middot;y_Hb + Hs&middot;y_Hs + HE&middot;y_HE = '+R(Hb*yHb)+' + '+R(Hs*yHs)+' + '+R(HE*yHE)+' = <span class="cval">'+R(Mot)+' ft-k</span></div>'
    +'<hr class="csep">'
    +'<div class="mrow">SF = '+R(MR+MHp)+' / '+R(Mot)+' = <span class="cval">'+R(SFot)+'</span> &nbsp;(required &ge; 1.5) '+(SFot>=1.5?'<span class="pass">OK</span>':'<span class="fail">NG</span>')+'</div></div>';

  // 6. SLIDING
  var Fric=mu*SW, Rsl=Hpas+Fric, SFsl=Rsl/sumH;
  var detSL='<div class="cref-hdr">Sliding — IBC 1807.2.3</div><div class="cwb">'
    +'<div class="mrow">Demand &Sigma;H = Hb + Hs + HE = '+R(Hb)+' + '+R(Hs)+' + '+R(HE)+' = <span class="cval">'+R(sumH)+' kips</span></div>'
    +'<hr class="csep">'
    +'<div class="mrow">Passive: Hp = 0.5&middot;Pp&middot;(hp+hf+hk)&sup2;&middot;Sc = 0.5&middot;'+Pp+'&middot;'+R(dpas)+'&sup2;&middot;'+R(Sc,1)+'/1000 = <span class="cval">'+R(Hpas)+' k</span></div>'
    +'<div class="mrow">Friction = &mu;&middot;&Sigma;W = '+mu+'&middot;'+R(SW)+' = <span class="cval">'+R(Fric)+' k</span></div>'
    +'<div class="mrow">Resistance = '+R(Hpas)+' + '+R(Fric)+' = <span class="cval">'+R(Rsl)+' k</span></div>'
    +'<hr class="csep">'
    +'<div class="mrow">SF = '+R(Rsl)+' / '+R(sumH)+' = <span class="cval">'+R(SFsl)+'</span> &nbsp;(required &ge; 1.5) '+(SFsl>=1.5?'<span class="pass">OK</span>':'<span class="fail">NG</span>')+'</div></div>';

  // 7. BEARING
  var Mnet=MR+MHp-Mot, xbar=Mnet/SW, ev=Lavg/2-xbar;
  var qmax,qmin,bn;
  if(ev<=Lavg/6){qmax=(SW/Aftg)*(1+6*ev/Lavg);qmin=(SW/Aftg)*(1-6*ev/Lavg);bn='Within middle third - trapezoidal';}
  else if(xbar>0){var Be=3*xbar;qmax=2*SW/(Be*Sc);qmin=0;bn='Outside middle third - triangular, B_eff='+R(Be)+' ft';}
  else{qmax=999;qmin=0;bn='Resultant outside footing - UNSTABLE';}

  // base pressure diagram (toe at left) for the det panel
  var pdSvg='';
  if(qmax<900){
    var pw=420,ph=130,px0=46,pbw=330,pyb=34;
    var qref=Math.max(qmax,qmin,0.001), qsc=58/qref;
    var hT=qmax*qsc, hH=qmin*qsc;
    pdSvg='<svg width="'+pw+'" height="'+ph+'" viewBox="0 0 '+pw+' '+ph+'" style="display:block;margin:8px auto 0;max-width:100%">'
      +'<line x1="'+px0+'" y1="'+pyb+'" x2="'+(px0+pbw)+'" y2="'+pyb+'" stroke="#1a2b5f" stroke-width="2.5"/>'
      +'<polygon points="'+px0+','+pyb+' '+(px0+pbw)+','+pyb+' '+(px0+pbw)+','+(pyb+hH)+' '+px0+','+(pyb+hT)+'" fill="#2e4a8a" opacity="0.25" stroke="#2e4a8a" stroke-width="1.2"/>'
      +'<line x1="'+px0+'" y1="'+pyb+'" x2="'+px0+'" y2="'+(pyb+hT)+'" stroke="#2e4a8a" stroke-width="1.2"/>'
      +'<text x="'+px0+'" y="'+(pyb+hT+16)+'" fill="#2e4a8a" font-size="11" font-family="IBM Plex Mono,monospace">q_max = '+R(qmax,2)+' ksf (toe)</text>'
      +'<text x="'+(px0+pbw)+'" y="'+(pyb+Math.max(hH,8)+16)+'" fill="#2e4a8a" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="end">q_min = '+R(qmin,2)+' ksf (heel)</text>'
      +'<text x="'+(px0+pbw/2)+'" y="'+(pyb-8)+'" fill="#1a7a4a" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="middle">Lavg = '+R(Lavg,2)+' ft</text>'
      +'<text x="'+(px0-6)+'" y="'+(pyb+4)+'" fill="#6b7a96" font-size="10" text-anchor="end" font-family="IBM Plex Mono,monospace">TOE</text>'
      +'<text x="'+(px0+pbw+6)+'" y="'+(pyb+4)+'" fill="#6b7a96" font-size="10" font-family="IBM Plex Mono,monospace">HEEL</text>'
      +'</svg>';
  }
  var detBR='<div class="cref-hdr">Bearing Pressure (weighted-avg footing length Lavg = '+R(Lavg)+' ft)</div><div class="cwb">'
    +'<div class="mrow">M_net = M_resist &minus; M_OT = '+R(MR)+' + '+R(MHp)+' &minus; '+R(Mot)+' = <span class="cval">'+R(Mnet)+' ft-k</span></div>'
    +'<div class="mrow">x&#772; = M_net/&Sigma;W = '+R(Mnet)+' / '+R(SW)+' = <span class="cval">'+R(xbar)+' ft</span> from toe</div>'
    +'<div class="mrow">e = Lavg/2 &minus; x&#772; = '+R(Lavg/2)+' &minus; '+R(xbar)+' = <span class="cval">'+R(ev)+' ft</span> &nbsp;(Lavg/6 = '+R(Lavg/6)+' ft)</div>'
    +'<div class="mrow">'+bn+'</div>'
    +'<hr class="csep">'
    +(ev<=Lavg/6
      ? '<div class="mrow">q = (&Sigma;W/A_ftg)(1 &plusmn; 6e/Lavg) = ('+R(SW)+'/'+R(Aftg)+')(1 &plusmn; 6&middot;'+R(ev)+'/'+R(Lavg)+')</div>'
      : (xbar>0 ? '<div class="mrow">q_max = 2&Sigma;W/(3x&#772;&middot;Sc) = 2&middot;'+R(SW)+'/(3&middot;'+R(xbar)+'&middot;'+R(Sc,1)+')</div>' : ''))
    +'<div class="mrow">q_max = <span class="cval">'+(qmax>900?'UNSTABLE':R(qmax)+' ksf')+'</span> vs Q_a = '+R(Qa,2)+' ksf &rarr; '+(qmax<=Qa?'<span class="pass">OK</span>':'<span class="fail">NG</span>')+'</div>'
    +'<div class="mrow">q_min = <span class="cval">'+R(qmin)+' ksf</span></div>'
    +pdSvg+'</div>';

  o+='<div class="card"><h3>5. Stability Checks (IBC 1807.2.3) &mdash; click &#9656; Calc for full math</h3>';
  o+='<table class="chk-table"><thead><tr>'
    +'<th style="width:22%">Check</th><th>Reference</th><th>Demand</th><th>Capacity</th>'
    +'<th style="width:120px">D/C</th><th style="width:64px">Status</th><th style="width:70px">Detail</th></tr></thead><tbody>';
  o+=cfChkRow('cf0','Overturning FS','IBC 1807.2.3','M_OT = '+R(Mot)+' ft-k','M_R = '+R(MR+MHp)+' ft-k<br><span style="color:var(--dim)">FS = '+R(SFot,2)+' (req 1.5)</span>',1.5/SFot,SFot>=1.5,detOT);
  o+=cfChkRow('cf1','Sliding FS','IBC 1807.2.3','&Sigma;H = '+R(sumH)+' k','Hp+&mu;&Sigma;W = '+R(Rsl)+' k<br><span style="color:var(--dim)">FS = '+R(SFsl,2)+' (req 1.5)</span>',1.5/SFsl,SFsl>=1.5,detSL);
  o+=cfChkRow('cf2','Soil Bearing q_max','Service, gross','q_max = '+(qmax>900?'UNSTABLE':R(qmax,2)+' ksf'),'Q_a = '+R(Qa,2)+' ksf',(qmax>900?Infinity:qmax/Qa),qmax<=Qa,detBR);
  o+='</tbody></table></div>';

  // 8. COMPARISON
  var SWss=(gb*H*LH_cf+gc*hf*Lcf+gc*tw*H+ws*LH_cf+0.5*H*LH_cf*(gc-gb)*tc/Sc+gc*hk*tw)/1000;
  var Hbss=0.5*Pa*Ht*Ht/1000,Hsss=ws*(Pa/gb)*Ht/1000,HEss=0.5*PE*Ht*Ht/1000;
  var Hpss=0.5*Pp*dpas*dpas/1000;
  var MRss=(gb*H*LH_cf*(LT+tw+LH_cf/2)+gc*hf*Lcf*(Lcf/2)+gc*tw*H*(LT+tw/2)+ws*LH_cf*(LT+tw+LH_cf/2)+0.5*H*LH_cf*(gc-gb)*tc/Sc*(LT+tw+(2/3)*LH_cf)+gc*hk*tw*xWk)/1000;
  var MHpss=Hpss*yHp;
  var Motss=Hbss*(Ht/3)+Hsss*(Ht/2)+HEss*(2*Ht/3);
  var SFotss=(MRss+MHpss)/Motss;
  var SFslss=(Hpss+mu*SWss)/(Hbss+Hsss+HEss);

  o+='<div class="card"><h3>8. Comparison: Bay vs Spreadsheet</h3>';
  o+='<div class="cmp">';
  o+='<div class="cbox"><h4>Spreadsheet (continuous '+R(LH_cf,1)+'\' heel, per ft)</h4><div class="eq">';
  o+='Sum(W) = <span class="v">'+R(SWss)+' k/ft</span>\n';
  o+='M_resist = <span class="v">'+R(MRss+MHpss)+' ft-k/ft</span>\n';
  o+='OT SF = <span class="v">'+R(SFotss)+'</span>\n';
  o+='Slide SF = <span class="v">'+R(SFslss)+'</span>';
  o+='</div></div>';
  o+='<div class="cbox"><h4>Bay analysis (actual geometry, per ft equiv)</h4><div class="eq">';
  o+='Sum(W) = <span class="v">'+R(SW/Sc)+' k/ft</span>\n';
  o+='M_resist = <span class="v">'+R((MR+MHp)/Sc)+' ft-k/ft</span>\n';
  o+='OT SF = <span class="v">'+R(SFot)+'</span>\n';
  o+='Slide SF = <span class="v">'+R(SFsl)+'</span>';
  o+='</div></div></div>';

  var avgH=(LH_cf*Wpad+LH_bw*clr)/Sc;
  var pct=(1-(SW/Sc)/SWss)*100;
  o+='<div class="note"><b>Impact:</b> Resisting weight drops <b>'+R(pct,1)+'%</b>. ';
  o+='Eff avg heel = <b>'+R(avgH)+' ft</b> vs '+R(LH_cf,1)+'\' assumed. ';
  o+='C/F pad width = '+R(Wpad,1)+'\' vs spreadsheet treating full bay at '+R(LH_cf,1)+'\' heel.</div>';
  o+='</div>';

  document.getElementById('out').innerHTML=o;
  _renderDiagrams();
  }catch(err){document.getElementById('out').innerHTML='<div class="card" style="color:#e94560">Error: '+err.message+'</div>';}
}

calculate();
</script>
