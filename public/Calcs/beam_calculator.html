<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCI Beam Design Calculator - Design Aid 15.1.3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1rem;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .calculate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 30px auto;
            min-width: 200px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .results {
            background: #f8fafe;
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid #e1e8ed;
        }

        .results h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-align: center;
        }

        .result-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .result-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.1rem;
            color: #667eea;
            font-weight: 700;
        }

        .beam-diagram {
            background: #fff;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-style: italic;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #e74c3c;
            background: #fdf2f2;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0;
        }

        .formula-display {
            background: #f1f3f4;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            border-left: 4px solid #34495e;
        }

        .unit-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 20px 0;
            padding: 20px;
            background: #f8fafe;
            border-radius: 10px;
            border: 1px solid #e1e8ed;
        }

        @media print {
            body { background: #fff !important; padding: 0; }
            .container { box-shadow: none; }
            .results { display: block !important; }
            /* ARE Summary print mode: results only */
            body[data-pm="s"] .unit-selection { display: none !important; }
            body[data-pm="s"] .inputs-grid { display: none !important; }
            body[data-pm="s"] .beam-diagram { display: none !important; }
            body[data-pm="s"] .form-group { display: none !important; }
            body[data-pm="s"] .formula-display { display: none !important; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 20px;
            }
            
            .inputs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PCI Beam Design Calculator</h1>
            <p>Design Aid 15.1.3 - Beam Design Equations and Diagrams</p>
        </div>
        
        <div class="content">
            <div class="unit-selection">
                <div class="form-group">
                    <label for="lengthUnit">Length Units:</label>
                    <select id="lengthUnit">
                        <option value="ft">Feet</option>
                        <option value="in">Inches</option>
                        <option value="m">Meters</option>
                        <option value="mm">Millimeters</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="forceUnit">Force Units:</label>
                    <select id="forceUnit">
                        <option value="lb">Pounds (lb)</option>
                        <option value="kip">Kips</option>
                        <option value="N">Newtons</option>
                        <option value="kN">KiloNewtons</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="beamType">Select Beam Configuration:</label>
                <select id="beamType" onchange="updateInputs()">
                    <option value="">Choose a beam type...</option>
                    
                    <optgroup label="1A - Simple Beam - Concentrated Loads">
                        <option value="1A.1">1A.1 - Concentrated Load at Center</option>
                        <option value="1A.2">1A.2 - Concentrated Load at Any Point</option>
                        <option value="1A.3">1A.3 - Two Equal Concentrated Loads Symmetrically Placed</option>
                        <option value="1A.4">1A.4 - Two Unequal Concentrated Loads Asymmetrically Placed</option>
                    </optgroup>
                    
                    <optgroup label="1B - Simple Beam - Distributed Loads">
                        <option value="1B.1">1B.1 - Uniformly Distributed Load</option>
                        <option value="1B.2">1B.2 - Uniformly Distributed Load and Variable End Moments</option>
                    </optgroup>
                    
                    <optgroup label="1C - Simple Beam - Partial Loads">
                        <option value="1C.1">1C.1 - Uniform Load Partially Distributed</option>
                    </optgroup>
                    
                    <optgroup label="1D - Simple Beam - Triangular Loads">
                        <option value="1D.1">1D.1 - Load Increasing Uniformly to One End</option>
                        <option value="1D.2">1D.2 - Load Increasing Uniformly to Center</option>
                    </optgroup>

                    <optgroup label="1E - Simple Beam - Applied Moments">
                        <option value="1E.1">1E.1 - Moment Applied at One End</option>
                        <option value="1E.2">1E.2 - Moment Applied at Any Point</option>
                        <option value="1E.3">1E.3 - Moments Applied at Each End</option>
                    </optgroup>
                    
                    <optgroup label="2A - Overhanging Beam - Concentrated Loads">
                        <option value="2A.1">2A.1 - Concentrated Load at Any Point Between Supports</option>
                        <option value="2A.2">2A.2 - Concentrated Load at End of Overhang</option>
                    </optgroup>

                    <optgroup label="2B - Overhanging Beam - Distributed Loads">
                        <option value="2B.1">2B.1 - Uniformly Distributed Load</option>
                    </optgroup>

                    <optgroup label="2C - Overhanging Beam - Partial Loads">
                        <option value="2C.1">2C.1 - Uniformly Distributed Load Between Supports</option>
                        <option value="2C.2">2C.2 - Uniformly Distributed Load on Overhang</option>
                    </optgroup>
                    
                    <optgroup label="3A - Fixed-Simply Supported - Concentrated Loads">
                        <option value="3A.1">3A.1 - Concentrated Load at Center</option>
                        <option value="3A.2">3A.2 - Concentrated Load at Any Point</option>
                    </optgroup>

                    <optgroup label="3B - Fixed-Simply Supported - Distributed Loads">
                        <option value="3B.1">3B.1 - Uniformly Distributed Load</option>
                    </optgroup>

                    <optgroup label="3C - Fixed-Simply Supported - Partial Loads">
                        <option value="3C.1">3C.1 - Uniform Load Partially Distributed Over Span</option>
                    </optgroup>

                    <optgroup label="3E - Fixed-Simply Supported - Applied Moments">
                        <option value="3E.1">3E.1 - Moment Applied at the Flexible End</option>
                    </optgroup>

                    <optgroup label="3F - Fixed-Simply Supported - Support Settlement">
                        <option value="3F.1">3F.1 - Differential Settlement of Supports</option>
                        <option value="3F.2">3F.2 - Rotation of Support</option>
                    </optgroup>
                    
                    <optgroup label="4A - Fixed Both Ends - Concentrated Loads">
                        <option value="4A.1">4A.1 - Concentrated Load at Center</option>
                        <option value="4A.2">4A.2 - Concentrated Load at Any Point</option>
                    </optgroup>

                    <optgroup label="4B - Fixed Both Ends - Distributed Loads">
                        <option value="4B.1">4B.1 - Uniformly Distributed Loads</option>
                    </optgroup>

                    <optgroup label="4C - Fixed Both Ends - Partial Loads">
                        <option value="4C.1">4C.1 - Uniform Load Partially Distributed Over Span</option>
                    </optgroup>

                    <optgroup label="4E - Fixed Both Ends - Applied Moments">
                        <option value="4E.1">4E.1 - Moment Applied at Any Point</option>
                    </optgroup>

                    <optgroup label="4F - Fixed Both Ends - Support Settlement">
                        <option value="4F.1">4F.1 - Differential Settlement of Supports</option>
                        <option value="4F.2">4F.2 - Rotation of Support</option>
                    </optgroup>
                    
                    <optgroup label="5A-5E - Cantilever Beam">
                        <option value="5A.1">5A.1 - Concentrated Load at Free End</option>
                        <option value="5A.2">5A.2 - Concentrated Load at Any Point</option>
                        <option value="5B.1">5B.1 - Uniformly Distributed Load</option>
                        <option value="5C.1">5C.1 - Uniform Load Partially Distributed at Free End</option>
                        <option value="5D.1">5D.1 - Load Increasing Uniformly to Fixed End</option>
                        <option value="5D.2">5D.2 - Varying Load Increasing Uniformly from Support to Free End</option>
                        <option value="5E.1">5E.1 - Moment Applied at Free End</option>
                    </optgroup>

                    <optgroup label="6A-6B - Continuous Beam">
                        <option value="6A.1">6A.1 - Two Spans, Concentrated Load at Center of One Span</option>
                        <option value="6A.2">6A.2 - Two Spans, Concentrated Load at Any Point of One Span</option>
                        <option value="6B.1">6B.1 - Two Span, Uniform Load Over One Span</option>
                    </optgroup>
                </select>
            </div>

            <div class="beam-diagram" id="beamDiagram">
                Select a beam configuration to see the diagram and input parameters
            </div>

            <div class="inputs-grid" id="inputsContainer">
                <!-- Dynamic inputs will be generated here -->
            </div>

            <button class="calculate-btn" onclick="calculateResults()" id="calculateBtn" style="display: none;">
                Calculate Results
            </button>

            <div class="results hidden" id="resultsContainer">
                <h3>Results</h3>
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <script>
        const beamConfigurations = {
            "1A.1": {
                name: "Simple Beam - Concentrated Load at Center",
                inputs: ["l", "P", "E", "I", "x"],
                diagram: "Simple beam with concentrated load P at center, span length l",
                formulas: {
                    "R (Reaction)": "P/2",
                    "Mmax (at center)": "P*l/4",
                    "Mx (when x < l/2)": "P*x/2",
                    "Vx (when x < l/2)": "P/2",
                    "Δmax (at center)": "P*l³/(48*E*I)"
                }
            },
            "1A.2": {
                name: "Simple Beam - Concentrated Load at Any Point",
                inputs: ["l", "P", "a", "b", "E", "I", "x"],
                diagram: "Simple beam with concentrated load P at distance 'a' from left support, 'b' from right support",
                formulas: {
                    "R1 (left reaction)": "P*b/l",
                    "R2 (right reaction)": "P*a/l",
                    "Mmax (at load point)": "P*a*b/l",
                    "Mx (when x < a)": "P*b*x/l",
                    "Vx (when x < a)": "P*b/l",
                    "Δa (at load point)": "P*a²*b²/(3*E*I*l)"
                }
            },
            "1A.3": {
                name: "Simple Beam - Two Equal Concentrated Loads Symmetrically Placed", 
                inputs: ["l", "P", "a", "E", "I"],
                diagram: "Simple beam with two equal loads P at distance 'a' from each support",
                formulas: {
                    "R (each reaction)": "P",
                    "Mmax (between loads)": "P*a",
                    "Δmax (at midspan)": "P*a*(3*l²-4*a²)/(24*E*I)"
                }
            },
            "1A.4": {
                name: "Simple Beam - Two Unequal Concentrated Loads Asymmetrically Placed",
                inputs: ["l", "P1", "P2", "a", "b", "E", "I"],
                diagram: "Simple beam with loads P1 at distance 'a' from left, P2 at distance 'b' from right",
                formulas: {
                    "R1 (left reaction)": "(P1*(l-a) + P2*b)/l",
                    "R2 (right reaction)": "(P1*a + P2*(l-b))/l",
                    "M1 (max when R1 < P1)": "R1*a",
                    "M2 (max when R2 < P2)": "R2*b"
                }
            },
            "1B.1": {
                name: "Simple Beam - Uniformly Distributed Load",
                inputs: ["l", "w", "E", "I", "x"],
                diagram: "Simple beam with uniform load w over entire span",
                formulas: {
                    "R (each reaction)": "w*l/2",
                    "Vx": "w*(l/2 - x)",
                    "Mmax (at center)": "w*l²/8",
                    "Mx": "w*x*(l-x)/2",
                    "Δmax (at center)": "5*w*l⁴/(384*E*I)"
                }
            },
            "1B.2": {
                name: "Simple Beam - Uniformly Distributed Load and Variable End Moments",
                inputs: ["l", "w", "M1", "M2", "E", "I"],
                diagram: "Simple beam with uniform load w and end moments M1 and M2",
                formulas: {
                    "R1 (left reaction)": "w*l/2 + (M1-M2)/l",
                    "R2 (right reaction)": "w*l/2 - (M1-M2)/l",
                    "M3 (Mmax, at x = l/2 + (M1-M2)/(w*l))": "w*l²/8 - (M1+M2)/2 + (M1-M2)²/(2*w*l²)"
                }
            },
            "1C.1": {
                name: "Simple Beam - Uniform Load Partially Distributed",
                inputs: ["l", "w", "a", "b", "E", "I"],
                diagram: "Simple beam with uniform load w from distance 'a' to 'a+b' from left support",
                formulas: {
                    "R1 (left reaction)": "w*b*(2*l-2*a-b)/(2*l)",
                    "R2 (right reaction)": "w*b*(2*a+b)/(2*l)",
                    "Mmax (at x = a + R1/w)": "R1*(a + R1/(2*w))"
                }
            },
            "1D.1": {
                name: "Simple Beam - Load Increasing Uniformly to One End",
                inputs: ["l", "W", "E", "I"],
                diagram: "Simple beam with triangular load, zero at left, total load W at right",
                formulas: {
                    "R1 (left reaction)": "W/3",
                    "R2 (right reaction)": "2*W/3", 
                    "Mmax (at x=l/√3)": "2*W*l/(9*Math.sqrt(3))",
                    "Δmax": "0.01304*W*l³/(E*I)"
                }
            },
            "1D.2": {
                name: "Simple Beam - Load Increasing Uniformly to Center",
                inputs: ["l", "W", "E", "I"],
                diagram: "Simple beam with triangular load, zero at ends, total load W at center",
                formulas: {
                    "R (each reaction)": "W/2",
                    "Mmax (at center)": "W*l/6",
                    "Δmax (at center)": "W*l³/(60*E*I)"
                }
            },
            "1E.1": {
                name: "Beam Simply Supported - Moment Applied at One End",
                inputs: ["l", "Mo", "E", "I"],
                diagram: "Simple beam with moment Mo applied at one end",
                formulas: {
                    "R1 (left reaction)": "-Mo/l",
                    "R2 (right reaction)": "Mo/l",
                    "Mmax (at R1)": "Mo",
                    "Δmax (at x=0.423*l)": "0.0642*Mo*l²/(E*I)"
                }
            },
            "1E.2": {
                name: "Beam Simply Supported - Moment Applied at Any Point",
                inputs: ["l", "Mo", "a", "b", "E", "I"],
                diagram: "Simple beam with moment Mo applied at distance 'a' from left support",
                formulas: {
                    "R1 (left reaction)": "Mo/l",
                    "R2 (right reaction)": "Mo/l",
                    "Mmax(-) (at x=a)": "Mo*a/l",
                    "Mmax(+) (at x=a)": "Mo*(1-a/l)",
                    "MCL (at center)": "-Mo/2"
                }
            },
            "1E.3": {
                name: "Beam Simply Supported - Moments Applied at Each End",
                inputs: ["l", "M1", "M2", "E", "I"],
                diagram: "Simple beam with moments M1 and M2 applied at ends",
                formulas: {
                    "R1 (left reaction)": "(M2-M1)/l",
                    "R2 (right reaction)": "-(M2-M1)/l",
                    "Mx (moment at x)": "(M2-M1)*x/l + M1"
                }
            },
            "2A.1": {
                name: "Beam Overhanging One Support - Concentrated Load Between Supports",
                inputs: ["l", "P", "a", "b", "E", "I"],
                diagram: "Overhanging beam with load P at distance 'a' from left support, 'b' from right support",
                formulas: {
                    "R1 (left reaction)": "P*b/l",
                    "R2 (right reaction)": "P*a/l",
                    "Mmax (at load point)": "P*a*b/l",
                    "Δa (at load point)": "P*a²*b²/(3*E*I*l)"
                }
            },
            "2A.2": {
                name: "Beam Overhanging One Support - Concentrated Load at End",
                inputs: ["l", "P", "a", "E", "I"],
                diagram: "Overhanging beam with load P at free end, overhang length 'a'",
                formulas: {
                    "R1 (left reaction)": "P*a/l",
                    "R2 (right reaction)": "P*(l+a)/l",
                    "Mmax (at R2)": "P*a",
                    "Δmax (at free end)": "P*a²*(l+a)/(3*E*I)"
                }
            },
            "2B.1": {
                name: "Beam Overhanging One Support - Uniformly Distributed Load",
                inputs: ["l", "w", "a", "E", "I"],
                diagram: "Overhanging beam with uniform load w over entire length including overhang 'a'",
                formulas: {
                    "R1 (left reaction)": "w*(l²-a²)/(2*l)",
                    "R2 (right reaction)": "w*(l+a)²/(2*l)",
                    "M2 (at R2)": "w*a²/2"
                }
            },
            "2C.1": {
                name: "Beam Overhanging One Support - Uniformly Distributed Load Between Supports",
                inputs: ["l", "w", "a", "E", "I"],
                diagram: "Overhanging beam with uniform load w between supports only",
                formulas: {
                    "R (each reaction)": "w*l/2",
                    "Mmax (at center)": "w*l²/8",
                    "Δmax (at center)": "5*w*l⁴/(384*E*I)"
                }
            },
            "2C.2": {
                name: "Beam Overhanging One Support - Uniformly Distributed Load on Overhang",
                inputs: ["l", "w", "a", "E", "I"],
                diagram: "Overhanging beam with uniform load w on overhang only",
                formulas: {
                    "R1 (left reaction)": "w*a²/(2*l)",
                    "R2 (right reaction)": "w*a*(2*l+a)/(2*l)",
                    "Mmax (at R2)": "w*a²/2",
                    "Δmax (at free end)": "w*a³*(4*l+3*a)/(24*E*I)"
                }
            },
            "3A.1": {
                name: "Fixed-Simply Supported Beam - Concentrated Load at Center",
                inputs: ["l", "P", "E", "I", "x"],
                diagram: "Propped cantilever — simple support at left, fixed at right; load P at center (x measured from the simple support)",
                formulas: {
                    "R1 (simple support)": "5*P/16",
                    "R2 (fixed end)": "11*P/16",
                    "Mmax (at fixed end)": "3*P*l/16",
                    "M1 (at load point)": "5*P*l/32",
                    "Mx (when x < l/2)": "5*P*x/16",
                    "Vx (when x < l/2)": "5*P/16",
                    "Δmax": "0.009317*P*l³/(E*I)"
                }
            },
            "3A.2": {
                name: "Fixed-Simply Supported Beam - Concentrated Load at Any Point",
                inputs: ["l", "P", "a", "b", "E", "I"],
                diagram: "Propped cantilever — simple support at left, fixed at right; load P at distance 'a' from the simple support, 'b' from the fixed end (AISC 3-23 case 14)",
                formulas: {
                    "R1 (simple support)": "P*b²*(a+2*l)/(2*l³)",
                    "R2 (fixed end)": "P*a*(3*l²-a²)/(2*l³)",
                    "M1 (at load point)": "R1*a",
                    "M2 (at fixed end)": "P*a*b*(a+l)/(2*l²)"
                }
            },
            "3B.1": {
                name: "Fixed-Simply Supported Beam - Uniformly Distributed Load",
                inputs: ["l", "w", "E", "I"],
                diagram: "Propped cantilever — simple support at left, fixed at right; uniform load w (x measured from the simple support)",
                formulas: {
                    "R1 (simple support)": "3*w*l/8",
                    "R2 (fixed end)": "5*w*l/8",
                    "Mmax": "w*l²/8",
                    "M1 (at x=3l/8)": "9*w*l²/128",
                    "Δmax": "w*l⁴/(185*E*I)"
                }
            },
            "3C.1": {
                name: "Fixed-Simply Supported Beam - Uniform Load Partially Distributed",
                inputs: ["l", "w", "a", "b", "E", "I"],
                diagram: "Propped cantilever — simple support at left, fixed at right; uniform load w from x=a to x=a+b (x from the simple support)",
                formulas: {
                    "R1 (simple support)": "w*(l*((l-a)³-(l-a-b)³) - ((l-a)⁴-(l-a-b)⁴)/4)/(2*l³)",
                    "R2 (fixed end)": "w*b - R1",
                    "M2 (at fixed end)": "R1*l - w*b*(l-a-b/2)",
                    "Mmax(+) (at x = R1/w, if within load)": "R1*(a + R1/(2*w))"
                }
            },
            "3E.1": {
                name: "Fixed-Simply Supported Beam - Moment Applied at Flexible End",
                inputs: ["l", "Mo", "E", "I"],
                diagram: "Beam fixed at left, simply supported at right, moment Mo at right end",
                formulas: {
                    "R1 (fixed end)": "-3*Mo/(2*l)",
                    "R2 (simple support)": "3*Mo/(2*l)",
                    "M1": "Mo",
                    "M2": "Mo/2",
                    "Δmax (at x=l/3)": "Mo*l²/(27*E*I)"
                }
            },

        function updateInputs() {
            const beamType = document.getElementById('beamType').value;
            const inputsContainer = document.getElementById('inputsContainer');
            const beamDiagram = document.getElementById('beamDiagram');
            const calculateBtn = document.getElementById('calculateBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            
            // Clear previous inputs and results
            inputsContainer.innerHTML = '';
            resultsContainer.classList.add('hidden');
            
            if (!beamType || !beamConfigurations[beamType]) {
                beamDiagram.textContent = 'Select a beam configuration to see the diagram and input parameters';
                calculateBtn.style.display = 'none';
                return;
            }
            
            const config = beamConfigurations[beamType];
            
            // Update diagram
            beamDiagram.innerHTML = `<strong>${config.name}</strong><br><em>${config.diagram}</em>`;
            
            // Create input fields
            config.inputs.forEach(input => {
                const div = document.createElement('div');
                div.className = 'form-group';
                
                let label = '';
                let placeholder = '';
                let unit = '';
                
                switch(input) {
                    case 'l':
                        label = 'Length (l)';
                        placeholder = 'Enter beam length';
                        unit = getUnitText('length');
                        break;
                    case 'P':
                    case 'P1':
                    case 'P2':
                        label = input === 'P' ? 'Point Load (P)' : `Point Load (${input})`;
                        placeholder = `Enter point load ${input}`;
                        unit = getUnitText('force');
                        break;
                    case 'w':
                        label = 'Distributed Load (w)';
                        placeholder = 'Enter distributed load';
                        unit = getUnitText('distributed');
                        break;
                    case 'W':
                        label = 'Total Load (W)';
                        placeholder = 'Enter total load';
                        unit = getUnitText('force');
                        break;
                    case 'a':
                        label = 'Distance a';
                        placeholder = 'Enter distance a';
                        unit = getUnitText('length');
                        break;
                    case 'b':
                        label = 'Distance b';
                        placeholder = 'Enter distance b';
                        unit = getUnitText('length');
                        break;
                    case 'd':
                        label = 'Distance d';
                        placeholder = 'Enter distance d';
                        unit = getUnitText('length');
                        break;
                    case 'e':
                        label = 'Distance e';
                        placeholder = 'Enter distance e';
                        unit = getUnitText('length');
                        break;
                    case 'E':
                        label = 'Modulus of Elasticity (E)';
                        placeholder = 'Enter E value';
                        unit = getUnitText('modulus');
                        break;
                    case 'I':
                        label = 'Moment of Inertia (I)';
                        placeholder = 'Enter I value';
                        unit = 'in⁴';
                        break;
                    case 'x':
                        label = 'Distance x (for Vx, Mx calculations)';
                        placeholder = 'Enter position x from left support';
                        unit = getUnitText('length');
                        break;
                    case 'M1':
                    case 'M2':
                    case 'Mo':
                        label = input === 'Mo' ? 'Applied Moment (Mo)' : `End Moment ${input}`;
                        placeholder = `Enter moment ${input}`;
                        unit = getUnitText('moment');
                        break;
                    case 'Δ1':
                    case 'Δ2':
                        label = `Settlement ${input}`;
                        placeholder = `Enter settlement ${input}`;
                        unit = getUnitText('length');
                        break;
                    case 'φ1':
                    case 'φ2':
                        label = `Rotation ${input}`;
                        placeholder = `Enter rotation ${input}`;
                        unit = 'radians';
                        break;
                }
                
                div.innerHTML = `
                    <label for="${input}">${label} (${unit}):</label>
                    <input type="number" id="${input}" placeholder="${placeholder}" step="any">
                `;
                
                inputsContainer.appendChild(div);
            });
            
            calculateBtn.style.display = 'block';
        }

        function getUnitText(type) {
            const lengthUnit = document.getElementById('lengthUnit').value;
            const forceUnit = document.getElementById('forceUnit').value;
            
            switch(type) {
                case 'length':
                    return lengthUnit;
                case 'force':
                    return forceUnit;
                case 'distributed':
                    return `${forceUnit}/${lengthUnit}`;
                case 'moment':
                    return `${forceUnit}-${lengthUnit}`;
                case 'modulus':
                    return lengthUnit === 'ft' || lengthUnit === 'in' ? 'psi or ksi' : 'Pa or MPa';
                case 'inertia':
                    return `${lengthUnit}⁴`;
                default:
                    return '';
            }
        }

        function convertToConsistentUnits(value, fromType, toType) {
            // Convert length units to inches for deflection calculations
            if (fromType === 'ft' && toType === 'in') {
                return value * 12;
            } else if (fromType === 'in' && toType === 'in') {
                return value;
            } else if (fromType === 'm' && toType === 'in') {
                return value * 39.3701;
            } else if (fromType === 'mm' && toType === 'in') {
                return value * 0.0393701;
            }
            return value;
        }

        function calculateResults() {
            const beamType = document.getElementById('beamType').value;
            const config = beamConfigurations[beamType];
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsContent = document.getElementById('resultsContent');
            const lengthUnit = document.getElementById('lengthUnit').value;
            const forceUnit = document.getElementById('forceUnit').value;

            if (!config) return;

            // Which variables actually appear in this configuration's formulas
            const formulaText = Object.values(config.formulas).join(' ');
            function isUsed(v) {
                const esc = v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return new RegExp('(?<![\\w\u0394\u03c6])' + esc + '(?![\\w])').test(formulaText);
            }

            // Get input values and convert to a consistent lb-in system
            const values = {};
            let hasError = false;

            config.inputs.forEach(input => {
                const value = parseFloat(document.getElementById(input).value);
                if (isNaN(value)) {
                    if (!isUsed(input)) { values[input] = 0; return; } // unused input may stay blank
                    hasError = true;
                    return;
                }

                if (['l', 'a', 'b', 'd', 'e', 'x', 'Δ1', 'Δ2'].includes(input)) {
                    // Lengths (incl. support settlements) to inches
                    values[input] = convertLengthToInches(value, lengthUnit);
                } else if (input === 'w') {
                    values[input] = convertDistributedLoad(value, lengthUnit, forceUnit);
                } else if (['P', 'P1', 'P2', 'W'].includes(input)) {
                    values[input] = convertForce(value, forceUnit);
                } else if (['M1', 'M2', 'Mo'].includes(input)) {
                    values[input] = convertMoment(value, lengthUnit, forceUnit);
                } else if (input === 'E') {
                    values[input] = convertModulus(value, forceUnit);
                } else {
                    // I (in^4), φ1, φ2 (radians) remain as entered
                    values[input] = value;
                }
            });

            if (hasError) {
                resultsContent.innerHTML = '<div class="error">Please enter valid values for all inputs.</div>';
                resultsContainer.classList.remove('hidden');
                return;
            }

            // 1 display-unit of moment expressed in lb-in (for back-conversion)
            const momentFactor = convertMoment(1, lengthUnit, forceUnit);

            let resultsHTML = '';

            for (const [label, formula] of Object.entries(config.formulas)) {
                try {
                    const result = evaluateFormula(formula, values);

                    // Store the result so later formulas can reference it
                    // (e.g. "R2": "w*b - R1"). Key = leading token of the label.
                    const key = label.split(/[\s(]/)[0];
                    if (key && values[key] === undefined) values[key] = result;

                    let displayResult = result;
                    let resultUnit = '';

                    if (key.startsWith('Δ')) {
                        // Deflections are computed in inches
                        if (lengthUnit === 'm' || lengthUnit === 'mm') {
                            displayResult = result * 25.4;
                            resultUnit = 'mm';
                        } else {
                            resultUnit = 'in';
                        }
                    } else if (key.startsWith('M')) {
                        // Moments: lb-in back to the selected force-length units
                        displayResult = result / momentFactor;
                        resultUnit = `${forceUnit}-${lengthUnit}`;
                    } else if (key.startsWith('R') || key.startsWith('V')) {
                        displayResult = convertForceFromLbs(result, forceUnit);
                        resultUnit = forceUnit;
                    }

                    resultsHTML += `
                        <div class="result-item">
                            <div class="result-label">${label}:</div>
                            <div class="result-value">${displayResult.toFixed(4)} ${resultUnit}</div>
                            <div class="formula-display">Formula: ${formula}</div>
                        </div>
                    `;
                } catch (error) {
                    resultsHTML += `
                        <div class="result-item">
                            <div class="result-label">${label}:</div>
                            <div class="error">Error calculating: ${error.message}</div>
                        </div>
                    `;
                }
            }

            resultsContent.innerHTML = resultsHTML;
            resultsContainer.classList.remove('hidden');
        }

        function convertLengthToInches(value, fromUnit) {
            switch(fromUnit) {
                case 'ft': return value * 12;
                case 'in': return value;
                case 'm': return value * 39.3701;
                case 'mm': return value * 0.0393701;
                default: return value;
            }
        }

        function convertDistributedLoad(value, lengthUnit, forceUnit) {
            // Convert to lb/in for calculations
            let forceMultiplier = 1;
            let lengthDivisor = 1;
            
            // Convert force component
            switch(forceUnit) {
                case 'lb': forceMultiplier = 1; break;
                case 'kip': forceMultiplier = 1000; break;
                case 'N': forceMultiplier = 0.224809; break;
                case 'kN': forceMultiplier = 224.809; break;
            }
            
            // Convert length component (divide by length to get per inch)
            switch(lengthUnit) {
                case 'ft': lengthDivisor = 12; break;
                case 'in': lengthDivisor = 1; break;
                case 'm': lengthDivisor = 39.3701; break;
                case 'mm': lengthDivisor = 0.0393701; break;
            }
            
            return value * forceMultiplier / lengthDivisor;
        }

        function convertForce(value, forceUnit) {
            // Convert to lbs for calculations
            switch(forceUnit) {
                case 'lb': return value;
                case 'kip': return value * 1000;
                case 'N': return value * 0.224809;
                case 'kN': return value * 224.809;
                default: return value;
            }
        }

        function convertMoment(value, lengthUnit, forceUnit) {
            // Convert to lb-in for calculations
            const forceInLbs = convertForce(1, forceUnit);
            const lengthInInches = convertLengthToInches(1, lengthUnit);
            return value * forceInLbs * lengthInInches;
        }

        function convertModulus(value, forceUnit) {
            // Convert to psi for calculations
            switch(forceUnit) {
                case 'lb': return value; // Assume psi
                case 'kip': return value * 1000; // ksi to psi
                case 'N': return value * 0.000145038; // Pa to psi
                case 'kN': return value * 0.145038; // kPa to psi
                default: return value;
            }
        }

        function convertForceFromLbs(value, toForceUnit) {
            // Convert from lbs back to display units
            switch(toForceUnit) {
                case 'lb': return value;
                case 'kip': return value / 1000;
                case 'N': return value / 0.224809;
                case 'kN': return value / 224.809;
                default: return value;
            }
        }

        function evaluateFormula(formula, values) {
            let expression = formula;

            // Handle special mathematical functions
            expression = expression.replace(/Math\.sqrt\((\d+)\)/g, (match, num) => Math.sqrt(parseFloat(num)));

            // Replace variables, longest names first. Use lookaround boundaries
            // instead of \b so Greek-letter variables (Δ, φ) substitute correctly.
            const sortedKeys = Object.keys(values).sort((a, b) => b.length - a.length);
            for (const variable of sortedKeys) {
                const esc = variable.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp('(?<![\\w\u0394\u03c6])' + esc + '(?![\\w])', 'g');
                expression = expression.replace(regex, values[variable].toString());
            }

            // Handle superscript exponents on numbers or parenthesized groups
            expression = expression.replace(/(-?\d+(?:\.\d+)?(?:e-?\d+)?|\([^)]+\))\³/g, (match, base) => `Math.pow(${base}, 3)`);
            expression = expression.replace(/(-?\d+(?:\.\d+)?(?:e-?\d+)?|\([^)]+\))\²/g, (match, base) => `Math.pow(${base}, 2)`);
            expression = expression.replace(/(-?\d+(?:\.\d+)?(?:e-?\d+)?|\([^)]+\))\⁴/g, (match, base) => `Math.pow(${base}, 4)`);

            // Evaluate the expression safely
            try {
                return Function('"use strict"; return (' + expression + ')')();
            } catch (error) {
                throw new Error('Invalid formula: ' + formula);
            }
        }

        // Alias so the ARE Save/Load toolbar auto-runs after Load
        function runCalcs() { calculateResults(); }

        // Initialize unit display on page load
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('lengthUnit').addEventListener('change', updateInputs);
            document.getElementById('forceUnit').addEventListener('change', updateInputs);
        });
    </script>

        'cursor:pointer;white-space:nowrap;letter-spacing:.02em;',
        'transition:background .12s,color .12s;font-family:inherit;',
      '}',
      '.are-btn:hover{background:#1e3c72;color:#fff}',
      '.are-btn.pr{border-color:#2a5298;color:#2a5298}',
      '.are-btn.pr:hover{background:#2a5298;color:#fff}',
      '.are-spacer{flex:1;min-width:8px}',

      // ── Toast notification ────────────────────────────────────────────────
      '.are-toast{',
        'position:fixed;bottom:20px;right:20px;',
        'background:#1e3c72;color:#fff;',
        'padding:9px 18px;border-radius:6px;',
        'font-size:13px;font-family:system-ui,Arial,sans-serif;',
        'z-index:99999;opacity:0;transition:opacity .2s;',
        'pointer-events:none;box-shadow:0 2px 10px rgba(0,0,0,.25);',
      '}',
      '.are-toast.show{opacity:1}',

      // ── Print-only header (hidden on screen) ──────────────────────────────
      '.are-ph{display:none}',

      // ── Print media query ─────────────────────────────────────────────────
      '@media print{',

        // Always hide
        '.are-bar{display:none!important}',
        'button,.calc-btn,.det-btn,.btn-ra,.are-bar{display:none!important}',

        // Show print header
        '.are-ph{',
          'display:block!important;',
          'border-bottom:2px solid #1e3c72;',
          'padding-bottom:8px;margin-bottom:14px;',
          'font-family:system-ui,Arial,sans-serif;',
        '}',
        '.are-ph-title{font-size:15px;font-weight:700;color:#1e3c72;margin:0 0 3px}',
        '.are-ph-meta{font-size:11px;color:#555;margin:0}',

        // Results always visible when printing
        '.results,.results-section{display:block!important}',

        // — Summary mode (data-pm="s") ————————————————————————————————————
        // Hide input blocks, floor inputs, demand cards, detail panels
        'body[data-pm="s"] .blk{display:none!important}',
        'body[data-pm="s"] .floor-blk{display:none!important}',
        'body[data-pm="s"] #floor-con{display:none!important}',
        'body[data-pm="s"] .dem-grid{display:none!important}',
        'body[data-pm="s"] .det-row{display:none!important}',
        'body[data-pm="s"] .calc-btn{display:none!important}',
        // Keep check table and summary visible
        'body[data-pm="s"] .chk-table{display:table!important}',
        'body[data-pm="s"] .summary{display:block!important}',
        'body[data-pm="s"] #sumBox{display:block!important}',

        // — Full mode (data-pm="f") ——————————————————————————————————————
        // Show expanded detail rows
        'body[data-pm="f"] .det-row{display:table-row!important}',
        'body[data-pm="f"] .calc-det{display:block!important}',

        // Page setup
        '@page{margin:.75in;size:letter portrait}',

      '}', // end @media print

    ].join('');

    var el = document.createElement('style');
    el.id = 'are-utils-styles';
    el.textContent = css;
    document.head.appendChild(el);
  }

  // ── 2. Inject Toolbar ─────────────────────────────────────────────────────

  function injectToolbar() {
    // Toolbar
    var bar = document.createElement('div');
    bar.className = 'are-bar';
    bar.id = 'areBar';
    bar.innerHTML =
      '<label for="areJob">Project</label>' +
      '<input class="are-bar-job" id="areJob" type="text" placeholder="e.g. 2024-012 · Col C3" />' +
      '<div class="are-bar-sep"></div>' +
      '<button class="are-btn" onclick="areSave()">&#128190; Save</button>' +
      '<button class="are-btn" onclick="areLoad()">&#128194; Load</button>' +
      '<div class="are-spacer"></div>' +
      '<button class="are-btn pr" onclick="arePrint(\'s\')">&#128424; Summary</button>' +
      '<button class="are-btn pr" onclick="arePrint(\'f\')">&#128196; Full Calc</button>';

    document.body.insertBefore(bar, document.body.firstChild);

    // Print-only header block (right after toolbar, before calc content)
    var ph = document.createElement('div');
    ph.className = 'are-ph';
    ph.id = 'arePH';
    ph.innerHTML =
      '<div class="are-ph-title" id="arePHtitle">' + document.title + '</div>' +
      '<div class="are-ph-meta" id="arePHmeta"></div>';
    bar.insertAdjacentElement('afterend', ph);

    // Toast element
    var toast = document.createElement('div');
    toast.className = 'are-toast';
    toast.id = 'areToast';
    document.body.appendChild(toast);

    // Restore saved job name on load (non-intrusively — don't auto-fill inputs)
    try {
      var saved = localStorage.getItem(STORE_KEY);
      if (saved) {
        var d = JSON.parse(saved);
        if (d._job) document.getElementById('areJob').value = d._job;
      }
    } catch (e) { /* ignore */ }
  }

  // ── 3. Toast helper ────────────────────────────────────────────────────────

  function showToast(msg, ms) {
    var el = document.getElementById('areToast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(function () { el.classList.remove('show'); }, ms || 2600);
  }

  // ── 4. Save ────────────────────────────────────────────────────────────────

  window.areSave = function () {
    var job = '';
    var jobEl = document.getElementById('areJob');
    if (jobEl) job = jobEl.value.trim();

    var inputs = {};
    document.querySelectorAll('input[id], select[id], textarea[id]').forEach(function (el) {
      if (el.id === 'areJob') return;
      if (el.type === 'file') return;
      inputs[el.id] = el.type === 'checkbox' ? el.checked : el.value;
    });

    var payload = { _job: job, _ts: Date.now(), _inputs: inputs };

    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(payload));
      showToast('✓ Saved' + (job ? ' — ' + job : ''));
    } catch (e) {
      showToast('⚠ Save failed: storage may be full.');
    }
  };

  // ── 5. Load ────────────────────────────────────────────────────────────────

  window.areLoad = function () {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) {
      showToast('No saved inputs found for this calculator.', 3200);
      return;
    }

    var data;
    try { data = JSON.parse(raw); }
    catch (e) { showToast('⚠ Could not read saved data.', 3200); return; }

    // Restore job name
    var jobEl = document.getElementById('areJob');
    if (jobEl && data._job) jobEl.value = data._job;

    // Restore all inputs
    var count = 0;
    Object.keys(data._inputs || {}).forEach(function (id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (el.type === 'checkbox') {
        el.checked = !!data._inputs[id];
      } else {
        el.value = data._inputs[id];
      }
      // Dispatch events so dependent UI updates (e.g. updatePlan())
      el.dispatchEvent(new Event('input', { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
      count++;
    });

    // Auto-run calculations
    if (typeof runCalcs === 'function') { runCalcs(); }
    else if (typeof runAll === 'function') { runAll(); }
    else if (typeof calculate === 'function') { calculate(); }
    else if (typeof calcAll === 'function') { calcAll(); }

    var d = new Date(data._ts);
    var ds = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    showToast('✓ Loaded' + (data._job ? ' — ' + data._job : '') + '  (saved ' + ds + ')');
  };

  // ── 6. Print ───────────────────────────────────────────────────────────────

  window.arePrint = function (mode) {
    // Update print header
    var metaEl = document.getElementById('arePHmeta');
    if (metaEl) {
      var jobEl = document.getElementById('areJob');
      var jobStr = (jobEl && jobEl.value.trim()) ? jobEl.value.trim() + '  ·  ' : '';
      metaEl.textContent = jobStr + 'Anderson Rohr Engineers  ·  ' + new Date().toLocaleDateString();
    }

    if (mode === 'f') {
      // Expand all detail rows and panels before printing
      document.querySelectorAll('.det-row').forEach(function (el) {
        el.style.setProperty('display', 'table-row', 'important');
      });
      document.querySelectorAll('.calc-det').forEach(function (el) {
        el.style.setProperty('display', 'block', 'important');
      });
    }

    document.body.setAttribute('data-pm', mode);
    window.print();
    document.body.removeAttribute('data-pm');

    if (mode === 'f') {
      // Restore collapsed state
      document.querySelectorAll('.det-row').forEach(function (el) {
        el.style.removeProperty('display');
      });
      document.querySelectorAll('.calc-det').forEach(function (el) {
        el.style.removeProperty('display');
      });
    }
  };

  // ── 7. Init ────────────────────────────────────────────────────────────────

  function init() {
    injectStyles();
    injectToolbar();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();

</script>
</body>
</html>
